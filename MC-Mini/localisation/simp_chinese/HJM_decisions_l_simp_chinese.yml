l_simp_chinese:
   
   # ==================== 11号唱片 ====================
   HJM_record_13_category: "11号唱片"
   HJM_record_13_category_desc: "古老唱片的回声重新响起，像从废矿道深处传来的倒计时。帝国必须决定，是立刻拔剑，还是争取最后一点准备时间。"
   HJM_record_13_war_countdown: "11号唱片的回声"
   HJM_record_13_war_countdown_desc: "那张唱片已经开始播放。该任务会显示距离开战还剩多少天；倒计时结束时，HJM 将正式向 HIM开战。也可以直接选择该任务，立刻发动对 HIM 的战争。"
   HJM_record_13_war_countdown_tt: "选择该任务会立刻向HIM宣战；若不选择，倒计时结束时自动开战。"
   HJM_delay_record_13_war: "拖延开战"
   HJM_delay_record_13_war_desc: "动员官僚、安抚议会、重新解释唱片里的噪声。战争倒计时将延后30天，剩余天数显示在“11号唱片的回声”任务上。"

   # ==================== 战备整顿 ====================
   HJM_war_preparation_category: "战备整顿"
   HJM_war_preparation_category_desc: "边境异常已经从传闻变成报告。帝国可以在战争正式到来前整肃内部、抢修交通、扩张军需和动员民心。"
   HJM_suppress_illager_cells: "打压灾厄暗线"
   HJM_suppress_illager_cells_desc: "清查灾厄村民的联络点，扣押可疑信使，切断那些通往林地府邸和边境哨站的灰色渠道。"
   HJM_build_northern_railway: "抢修漠北军用铁路"
   HJM_build_northern_railway_desc: "调集民用工厂和工程队，为漠北驻军修筑一条临时军用铁路。它不漂亮，但能把补给送到前线。"
   HJM_build_western_railway: "抢修西线军用铁路"
   HJM_build_western_railway_desc: "绥远、西域和塞外驻军之间缺少可靠补给线。工程队将用最快速度铺设可用的军用铁路。"
   HJM_expand_factory_output: "加大工厂产出"
   HJM_expand_factory_output_desc: "延长铁匠铺和军工厂班次，压缩非必要订单，在短期内把更多钢铁和红石设备送进军队仓库。"
   HJM_wartime_propaganda: "战时政治宣传"
   HJM_wartime_propaganda_desc: "告诉村民边境上正在发生什么，也告诉他们为什么必须忍受更高的税负、征发和夜间戒严。"
   HJM_recommission_old_rifles: "重启老旧装备"
   HJM_recommission_old_rifles_desc: "打开旧仓库，清点封存的老式步枪。它们不先进，但比木棍可靠。"

   # ==================== 灾厄村民猖獗度 ====================
   HJM_illager_activity_category: "灾厄村民猖獗度"
   HJM_illager_activity_category_desc: "灾厄村民在边境与村庄暗处结网。若帝国长期不处理，猖獗度会每60天上升一级；投入政治资源清剿可以压低一级。"
   HJM_illager_activity_escalation: "灾厄村民活动扩张"
   HJM_illager_activity_escalation_desc: "如果未来60天内不继续清剿灾厄暗线，灾厄村民猖獗度将上升一个阶段。"
   HJM_reduce_illager_activity: "清剿灾厄暗线"
   HJM_reduce_illager_activity_desc: "投入行政力量、侦察队与地方驻军，切断灾厄村民的联络网。完成后，灾厄村民猖獗度将降低一个阶段，并重新计算下一轮扩张倒计时。"

   # ==================== 战时决议 ====================
   HJM_wartime_decisions_category: "战时决议"
   HJM_wartime_decisions_category_desc: "战争已经开始，帝国可以采取非常手段补充兵员、鼓动民心、转移工业并支援边疆。"
   HJM_mobilize_militia: "动员民兵"
   HJM_mobilize_militia_desc: "从村庄、矿区和边境聚落中抽调民兵，补充前线兵员和旧式武器。此举会削弱国内稳定。"
   HJM_war_propaganda: "战争宣传"
   HJM_war_propaganda_desc: "通过告示、巡回演讲和村庄集会重申战争目标，提升战争支持，但持续动员会加重社会压力。"
   HJM_third_line_construction: "三线建设"
   HJM_third_line_construction_desc: "把部分工坊、仓库和后备产能转入内陆与山区。短期内提升军工、民工和基础设施建设速度，但会增加民用负担。"
   HJM_support_frontier: "支援边疆"
   HJM_support_frontier_desc: "向边疆道路、哨站和前线补给点派出运输队与工程队，暂时改善部队补给和本土防御。"

   # ==================== 摄政战后重建 ====================
   HJM_postwar_regency_category: "摄政战后重建"
   HJM_postwar_regency_category_desc: "各地奏报已经摆上摄政政府长案。战争虽然结束，但抚恤、重建、藩属、军队、穿越者与旧臣都需要一一处理。"
   HJM_postwar_village_relief: "赈济边境村庄"
   HJM_postwar_village_relief_desc: "向被尸潮、炮火和征发压垮的村庄发放粮食、木材与抚恤。帝国必须让幸存者相信，胜利不会只属于宫廷和军队。"
   HJM_reopen_nether_routes: "重开下界通道"
   HJM_reopen_nether_routes_desc: "下界通道不能继续只作为战场存在。摄政政府将清理传送门、登记商队、设置哨卡，把胜利转化为可征税的道路。"
   HJM_inspect_vassal_oaths: "巡察藩属誓约"
   HJM_inspect_vassal_oaths_desc: "总督和监察使将前往新旧藩属，核查贡赋、军队、官署与誓约。臣服必须写进账册，也必须写进他们的日常秩序。"
   HJM_limit_traveler_privileges: "限制穿越者特权"
   HJM_limit_traveler_privileges_desc: "穿越者曾是帝国战时最锋利的剑，但和平不能永远交给一柄剑统治。摄政政府将审定协约，收回部分非常授权。"
   HJM_demobilize_front_armies: "复员前线军队"
   HJM_demobilize_front_armies_desc: "战争已经结束，部分士兵必须离开营地、回到村庄和工坊。复员会削弱战时热情，却能让社会重新呼吸。"
   HJM_old_guard_compromise: "安抚保皇旧臣"
   HJM_old_guard_compromise_desc: "人皇已逝，旧臣仍握着谱牒、仪制和地方人脉。摄政政府需要与他们达成第一份妥协，让王冠的影子暂时不再摇晃。"
   HJM_hunt_demon_remnants: "清剿下界残党"
   HJM_hunt_demon_remnants_desc: "Herobrine 的军团已经瓦解，但零散残党仍藏在废弃传送门、黑石哨塔和边境矿道里。地方驻军将按奏报逐点清剿，把战败后的阴影从村庄门口赶开。"
   HJM_purify_portal_scars: "净化传送门创痕"
   HJM_purify_portal_scars_desc: "许多传送门在战争中被强行开启、改造或污染。工程队将重铺道路，拆除危险框架，封存异常黑曜石，让通道重新服从帝国哨卡。"
   HJM_seal_record_anomalies: "封存异常唱片"
   HJM_seal_record_anomalies_desc: "十一号与十三号唱片的余音仍在民间传播。摄政政府将组织档案官、红石技师和巡查队，把危险记录从市场、学校和村庄广场中收回。"
   HJM_interrogate_nether_prisoners: "审讯下界俘虏"
   HJM_interrogate_nether_prisoners_desc: "被俘的魔族军官、堡垒工匠和传送门守卫知道许多未被写进战报的通道。审讯他们并不体面，却能让帝国更快看清残余威胁的形状。"
   HJM_seal_herobrine_legacy: "封存 Herobrine 遗产"
   HJM_seal_herobrine_legacy_desc: "残党已被清剿，传送门已被净化，异常唱片已入库，俘虏口供也归入密档。摄政政府将举行正式封存仪式，宣布 Herobrine 的战争遗产从此纳入帝国掌控。"
