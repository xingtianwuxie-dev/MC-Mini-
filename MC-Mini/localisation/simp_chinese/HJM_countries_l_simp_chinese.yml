 zhongjian: "武道修炼者"
 zhongjian_desc: "这名顾问相信体魄、纪律与传统武道可以塑造更强的国家。"
 rende: "仁德"
 rende_desc: "仁德的统治者能够稳定人心，并维持帝国各阶层之间的忠诚。"
 HJM_regent: "摄政王"
 HJM_regent_desc: "以微软的名义代行帝国权柄。法理正统，却非天命所归。"

 Xinxiehui: "暗流涌动"
 Xinxiehui_desc: "边境传来的消息越来越不安，敌意正在地下滋长。"
 Wulin: "武林模式"
 Wulin_desc: "帝国社会被动员到一种准战时秩序中，民生负担增加，但战争支持有所提升。"
 Hongwujungong: "洪武军工"
 Hongwujungong_desc: "洪武军工负责为帝国生产标准化步兵装备。"
 liuxue: "春秋乱世"
 liuxue_desc: "乱世迫使更多人口离开家园，也让军队训练与补员面临压力。"
 tongmeng: "古老的同盟"
 tongmeng_desc: "从和魔族作战以来，人族、龙族、精灵族便结为同盟。战争开始时，盟友会给予帝国必要的人员支持。"
 bingyuanqiangzheng: "兵员强征"
 bingyuanqiangzheng_desc: "帝国以强制方式扩大兵源，这会降低部队组织度，并在战争伤亡中削弱民心。"
 HJM_long_peace: "承平日久"
 HJM_long_peace_desc: "帝国承平百年，村民手不沾血。战士忘记如何战斗，帝国忘记何为敌人。"
 HJM_sleeping_lion: "睡狮苏醒"
 HJM_sleeping_lion_desc: "睡狮既醒，四海震惶。人皇 Notch 亲临基层，沉睡百年的战争机器轰然转动——铁傀儡列阵如林，红石大炮齐声轰鸣，人们执戈披甲。从漠北到南疆，工厂无不彻夜燃烧，村庄无不摇旗呐喊。这盛世空前，烈火烹油，鲜花着锦。帝国从久眠中苏醒——而醒来的狮子，誓要让整个世界为之颤抖。"



