 totalitarian_socialist_ideology: "极权社会主义"
 totalitarian_socialist_ideology_desc: "极权社会主义以社会主义名义建立高度集权的国家机器，将经济、组织和思想纳入统一管制。"
 libertarian_socialist: "自由社会主义"
 libertarian_socialist_noun: "自由社会主义"
 libertarian_socialist_desc: "自由社会主义政体"
 libertarian_socialist_ideology: "自由社会主义"
 libertarian_socialist_ideology_desc: "自由社会主义强调基层自治、社会平等和公共所有，同时反对过度集权的国家控制。"
 social_democrat: "社会民主主义"
