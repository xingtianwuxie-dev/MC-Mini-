   HJM_SUPEREVENT_WAR_OVERLINE: "MC帝国 - 魔族战争"
   HJM_SUPEREVENT_WAR_TITLE: "烽烟既起"
   HJM_SUPEREVENT_WAR_QUOTE: "十一号唱片的声音穿过黑夜，帝国终于听见了自己的战鼓。"
   HJM_SUPEREVENT_WAR_BODY: "Herobrine 的阴影重临主世界。边境村庄燃起烽火，武汉行在发出战争咨文，沉睡已久的古老帝国被迫睁眼。"
   HJM_SUPEREVENT_REGENCY_OVERLINE: "MC帝国 - 摄政时代"
   HJM_SUPEREVENT_REGENCY_TITLE: "王冠仍在"
   HJM_SUPEREVENT_REGENCY_QUOTE: "人皇能把天下聚成一拳；人皇既崩，每一根手指都会记起自己的方向。"
   HJM_SUPEREVENT_REGENCY_BODY: "Notch 逝世，旧臣拥立 Jeb，穿越者代表菲尔·斯宾塞以摄政之名入主议事厅。胜利的欢呼尚未散尽，帝国的裂缝已经开始发声。"
   HJM_SUPEREVENT_CLOSE: "执干戈以待"
