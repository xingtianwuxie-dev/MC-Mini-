l_simp_chinese:
   
     # ==================== HIM 事件 ====================
   HIM.1.t: "魔族集结"
   HIM.1.d: "下界从来没有真正安静过。岩浆海昼夜沸腾，灵魂沙谷低声呜咽，黑石要塞的长廊里堆满无人认领的骨、锈、灰与旧旗。主世界的史官把这里写成荒芜之地，把僵尸、骷髅、烈焰人与恶魂写成没有意志的怪物；他们说魔族只是夜色里的噪声，是村庄钟声响起时便会退散的恐惧。可是今日，所有巢穴同时听见了同一道命令。废弃矿道里的脚步不再杂乱，灵魂火旁的哨兵不再各自游荡，要塞钟楼上升起的不是部族旗，也不是某个巢穴的私印，而是一面足以让所有黑暗低头的旗帜。它没有温度，没有仁慈，也没有主世界帝国那套关于秩序、礼法与恩典的漂亮说辞；它只宣告一件事：黑暗也可以被编成军队，恐惧也可以列阵前进。那些曾被人类故事轻慢描摹的怪物，开始在同一张地图前集合。它们不再只是传说，不再只是边境夜袭，不再只是猎人酒馆里用来吓唬孩童的名字。魔族终于有了军纪，有了号角，有了从下界深处伸向主世界的方向。巢穴首领们仍互相猜忌，旧日仇怨仍在火光下翻涌，但所有怪物都明白，若继续散乱，它们只会被帝国一次次清剿、一次次写成战报脚注。若主世界称自己为古老帝国，那么下界今日便要回答：被帝国压在史书页脚的阴影，也会有写回正文的一天。这面旗帜升起时，没有人讨论胜利之后的归宿。它们只需要先证明一件事：下界不是等待讨伐的荒土，而是能向主世界发号施令的另一座王庭。"
   HIM.1.a: "黑暗终于有了秩序。"

   HIM.2.t: "邪恶复苏" 
   HIM.2.d: "Herobrine 的名字重新被刻进祭坛时，最先改变的不是军队，而是沉默。要塞深处多年无人靠近的黑曜石殿堂被重新点燃，灵魂火沿着裂缝向外蔓延，像一封写给所有死者的诏书。僵尸听见召唤，从矿井、墓穴与焚毁村落的边缘转身；骷髅取下旧弓，把骨指搭在弦上；烈焰人围绕塔顶盘旋，使火焰连成一道赤色冠冕。这个名字曾被主世界宫廷刻意抹去，被村庄长老压低声音，被帝国档案官用蜡封住最后一页。可被抹去的名字并不等于死亡，被封存的恐惧也不会因封条而消散。Herobrine 不需要向每一个巢穴解释自己的合法性。下界承认的不是血统，不是礼法，不是人皇座前那些繁复的称号；下界只承认能让所有怪物停止互相撕咬、转而朝同一个方向前进的力量。祭坛旁的监军开始烧毁旧令，重新分配兵权，把那些只听部族号角的队伍并入王庭旗号。远在主世界，旧唱片的纹路开始发烫，破碎旋律像从地底爬出的指令，钻进那些自称文明之人的梦里。帝国将把这叫做邪恶复苏，可在下界的祭坛旁，魔族把它叫做归位。黑暗不是突然降临的，它只是终于找回了自己的主人。从此以后，每一次军令都会带着这个名字的回声。谁若怀疑他是否归来，只需看看那些停止互相撕咬、转而列队听命的怪物。这便是归位最可怕的地方。"
   HIM.2.a: "让他们听见。"

   HIM.3.t: "下界整备"
   HIM.3.d: "整备下界比征服一座城更难。这里没有主世界那样平整的农田，没有四通八达的官道，也没有可以照章造册的村庄户籍。这里有的是岩浆海、断桥、黑石峭壁、灵魂沙谷里拖慢脚步的怨声，以及每一个巢穴都想把军令改成自己方言的旧习。Herobrine 的监军们因此先修路，再修营；先清点骨箭、腐肉、火药与黑石，再把各族首领召到同一张战争地图前。岩浆海旁的要塞被加高，黑石平台上堆满武器，烈焰工坊重新开炉，恶魂瞭望点校准通往主世界的航线。那些本该互相争食的怪物被编进不同队列，尸潮归尸潮，弓手归弓手，烈焰与凋零各有旗号，灾厄村民的情报被另册封存。下界依旧不适合秩序，它的每一道风都带着灼伤，每一条路都可能通向陷阱；但战争不需要它变成文明国家，战争只需要它按时产出兵、火、骨与恐惧。许多队伍第一次得到编号，许多巢穴第一次交出库存，许多首领第一次发现自己的私兵会被更高的命令调走。主世界的帝国把战争写成檄文，把动员称作儿郎共赴国难；下界没有这样的词。下界只把所有能杀人的东西搬到前线，然后让传送门一座座亮起。这套整备不会让下界变得温顺，反而会让它更危险：混乱被装进军令以后，便不再只是混乱，而会成为可以反复投向前线的力量。王庭也由此第一次像王庭。"
   HIM.3.a: "把下界铸成兵营。"

   HIM.4.t: "叛变者投诚"
   HIM.4.d: "叛变者抵达要塞时，没有人向他们献酒，也没有人允许他们把自己称作盟友。灾厄村民带来的第一份礼物，是主世界村庄的地图、巡逻路线、粮仓位置、钟楼警戒时刻和铁傀儡维护间隔；第二份礼物，则是多年积攒的怨毒。他们比任何下界斥候都了解村庄如何运转，知道哪条小路能绕过围墙，知道哪座桥夜里无人看守，知道村民会把孩子和粮食藏在哪里。Herobrine 的军官并不相信他们的忠诚。叛变者离开村庄，不是因为敬畏魔族，而是因为他们憎恨那些仍被帝国称作臣民的人；他们想看见钟楼倒塌，想看见铁傀儡被拆成废铁，想看见村庄广场上那套关于安居、贸易与守望相助的秩序被火焰舔干净。可是战争不总需要忠诚。忠诚需要奖赏、仪式和长久的承诺，仇恨却只需要一个出口。下界王庭把这些叛变者编入先导部队，让他们为尸潮指路，为劫掠者开门，为即将到来的大军证明主世界并非铁板一块。他们还带来了另一种东西：主世界内部裂缝的证据。只要有人愿意从内部开门，帝国所谓万民同心便只是钟楼上的口号。帝国日后会把他们叫作败类、内奸、灰皮人的毒线；但在今日的下界档案里，他们只是第一批主动把主世界钥匙交到黑暗手中的人。他们的存在也让 Herobrine 看清了主世界真正的裂口：最锋利的传送门未必由黑曜石搭成，有时只是一个被帝国长期拒绝的人。"
   HIM.4.a: "仇恨会为我们开路。"

   HIM.5.t: "开门！解放末地"
   HIM.5.d: "下界传送门证明，世界之间的边界从来不是神圣不可侵犯的墙，而是一道可以被黑曜石、火焰与意志撕开的帘幕。既然主世界可以被打开，末地便不该继续沉默。Herobrine 的术士们把末影珍珠、黑曜石碎片和被污染的唱片纹路摆上祭台，试图从旧传说里找出通往虚空王座的路。末地不像下界。下界喧嚣、沸腾、贪婪，像一炉永不冷却的铁；末地则沉默、空旷、悬浮在虚无边缘，仿佛所有声音落进去都会被吞掉。正因如此，它才有价值。谁能打破末地的沉默，谁就能让战争越过地面、矿洞、村庄与城墙，把主世界自以为稳固的边界全部改写。军官们争论这是否过早，灾厄向导担心末影势力并不可靠，烈焰工坊抱怨仪式消耗了太多稀有材料。Herobrine 没有解释。他只是命令点燃传送门。末影之力未必会驯服，虚空之民也未必会感恩，但混乱本身就是武器，裂缝本身就是通道。因为这场战争从一开始就不是边境冲突，不是下界为几座村庄而发动的袭扰，而是黑暗对整个世界秩序的重写。主世界的人皇可以把帝国称作天下中心；那么下界今日便要开门，把那些被排除在天下之外的力量一并拖进战场。门被点燃的一刻，术士们记录到多重回声。那不是盟友的保证，更像虚空本身的冷笑；但对 HIM 而言，只要主世界因此分神，冷笑也可算作援军。"
   HIM.5.a: "点燃传送门。"

   HIM.6.t: "君临主世界"
   HIM.6.d: "当对主世界的战争目标被宣读时，要塞大厅里短暂地安静了一瞬。不是因为恐惧，而是因为每个怪物都明白，这句话越过了以往所有夜袭、掠夺和边境冲突的尺度。阳光之下的村庄、矿洞、森林、城墙与王都，都将承认新的主人；魔族不再满足于躲在阴影里等待夜色，不再满足于让村民关门、让商队绕路、让帝国偶尔派兵清剿。主世界必须跪下。Herobrine 的战争不是单纯的复仇，至少他不愿把它说成复仇。复仇只能烧掉几座村庄，统治却要改写所有人的作息、税册、边界和信仰。僵尸将成为驻军，骷髅将站上城墙，灾厄村民将接管那些曾经拒绝他们的集市，烈焰人会在矿山口点燃新的标记。主世界的百姓会继续种田、挖矿、交易、繁衍，只是他们抬头看见的旗帜将不再属于人皇。那些仍愿投降的人可以活，那些坚持旧旗的人会成为尸潮的一部分；这便是下界给出的行政学。帝国史书把自己写成文明的中心，把下界写成要被驱逐的阴影；可阴影一旦占据白昼，所谓文明便只剩下谁有资格命令谁的问题。今日，HIM 向主世界索要的不是一座城，而是天下的定义权。这道宣言同时告诉所有附庸：追随 HIM 不是为了做旧秩序里的盗匪，而是为了在新秩序里抢到自己的座位，哪怕那个座位浸着血。旧王座因此开始动摇。"
   HIM.6.a: "主世界属于强者。"

   HIM.7.t: "僵尸围城"
   HIM.7.d: "尸潮是下界送给主世界的第一封战书。它没有华丽辞藻，没有使节仪仗，也不会在边境等候答复。它只在黄昏之后出现，从林线、矿洞、废墟和传送门阴影里涌出，像潮水一样推向村庄。尸潮不需要军饷，不需要粮道，不需要温暖营房，也不需要活人的恐惧来维系纪律；它们只需要一个方向，而 Herobrine 给了它们方向。第一座村庄被围时，钟声敲得比以往任何一次劫掠都急。铁傀儡在广场上迎敌，民兵把门闩抵住，孩童被塞进地窖，红石灯一盏盏亮到发白。可这次不一样。过去的僵尸会在黎明前散去，会被火把、围墙和巡逻队驱赶；如今它们后方有骷髅压阵，有灾厄向导校正路线，有下界要塞持续送来的新队列。每倒下一名守卫，尸潮便多一具可以继续行走的躯壳。主世界很快会明白，自己面对的不是自然灾害，不是夜晚的老问题，而是一种专为拖垮帝国边境而设计的战争机器。尸潮不求漂亮胜利，只求让帝国不断救火、不断失眠、不断把军队分散到每一段围墙。村庄若倒下，恐惧便会沿道路传向下一座村庄；下一座村庄再倒下，帝国所谓安宁便会像被撕开的木门一样，露出里面早已腐朽的纹理。因此尸潮真正围住的不只是村庄，也是帝国对和平的想象。只要钟声一夜比一夜急，主世界就会先在心里失守。"
   HIM.7.a: "让尸潮前进。"

   HIM.8.t: "天空不是极限"
   HIM.8.d: "主世界的人类曾以为高墙可以挡住尸潮，山脉可以挡住军队，河流可以切断补给，天空则是最后一道不属于战争的边界。他们错了。下界的火焰并不满足于烧毁地面，它会沿着恶魂的航线、烈焰人的轨迹和新建空港的黑石灯标升入云层。要塞工坊开始为非人的飞行方式改造武器：火球不再只是本能喷吐，而被编入轰击节奏；恶魂不再只是游荡幽影，而被驱赶到指定空域；烈焰人的火焰被记录、分配、测试，直到它们能在战场上照亮夜空。军官们把这叫作天空线，术士们把它叫作第二层传送门，Herobrine 只说一句：战争不会停在地面。对主世界而言，这意味着每一座以为远离前线的城市都将重新计算风险。城墙上方不再安全，山谷背后不再安全，连王都钟楼的阴影也可能在某个夜晚被火光撕开。更可怕的是，天空袭扰会让每一次胜利都变得不完整：地面守住了，粮仓仍可能燃烧；前线推进了，后方仍可能惊醒。帝国若想以古老和辽阔自保，HIM 便从天空证明，辽阔只是需要更多方向同时进攻。当天空也被拖进战争，主世界最后一点自信就会坠落。这也是对穿越者和帝国工匠的挑衅：若他们把技术当作救国之火，下界便要证明火也可以从另一边烧来。天空从此也会留下焦痕。主世界抬头时，已经太迟。无路可避。"
   HIM.8.a: "抬头看。"

   HIM.9.t: "11号唱片的播放"
   HIM.9.d: "唱片机转动时，议会厅里没有人立刻意识到那是什么。起初只是一阵破碎、低沉、像从很远地方传来的杂音，随后节奏开始变得清晰，仿佛有人在黑暗中拖着脚步穿过石廊，又仿佛旧档案柜里被封死的某一页正自行翻开。它不像音乐，更像某种被封存的记忆：火把熄灭前的喘息，矿洞深处忽然停住的镐声，王室家谱上被墨水涂掉的一行名字。年轻官员皱眉，老臣却在第一段旋律响起时变了脸色。因为他们知道，这不是普通唱片，也不是边境村民以讹传讹的怪谈。它是一封送达帝国心脏的黑函，一次没有使者的宣战，一只从下界伸出的手，按在了主世界最不愿承认的伤口上。有人提议立刻销毁唱片，有人要求封锁消息，有人低声问这是否与那个被抹去的名字有关。可唱片已经开始播放，恐惧也已经越过宫墙。更糟的是，唱片不只让人害怕，它还迫使帝国重新承认自己曾经隐瞒过什么。秘密一旦被声音说出，封条便失去意义。帝国可以命令史官沉默，可以把旧案重新锁进密库，却不能命令听见旋律的人忘记自己听见了什么。Herobrine 尚未亲临主世界，他的名字却已经先一步进入每个人的耳朵。于是唱片成为战争的序章，也成为遗产的源头。即使将来 HIM 的旗帜倒下，这段旋律仍会留在帝国档案里，像一根拔不净的刺。"
   HIM.9.a: "唱片已经开始播放。"

   HIM.10.t: "Herobrine的邀请"
   HIM.10.d: "Herobrine 的邀请不是用金印封好的盟约，而是一支带着焦痕的黑石令牌。使者穿过玄武岩城邦、猪灵堡垒、洞穴聚落和林地府邸时，很少谈论平等，也很少许诺长久的和平。他们只把一张主世界地图摊在各族首领面前，指出村庄、矿山、河道、旧王都和那些被帝国称作边疆却一直索取贡赋的土地。下界要塞已经集结，尸潮已有方向，传送门已经点亮，Herobrine 要求所有被主世界秩序排斥、压制或利用过的势力做出选择：继续各自为战，被帝国逐个清算；或者加入魔族，在同一面旗帜下反攻主世界。这个邀请本身就是威胁。猪灵看见黄金商路的机会，玄武岩城邦看见技术与自治的筹码，洞穴聚落看见摆脱旧账册的可能，林地府邸则看见向村庄复仇的道路。没有谁真正相信下界王庭的仁慈，但战争不要求他们彼此相爱，只要求他们暂时把刀锋朝向同一个敌人。若胜，他们可以在新秩序里讨价还价；若败，至少也能让帝国为每一寸胜利付出血价。主世界会把这称作邪恶同盟，会说怪物们在黑暗里结党。可在这些受邀者眼中，帝国的光照得太久，也烫伤了太多人。既然光不肯让出位置，阴影便联合起来，准备把白昼拉下王座。这支同盟因此从诞生起就带着裂纹，但裂纹并不妨碍它伤人。许多后来被帝国处置的仆从国，正是在这一刻把自己的命运押上了黑石令牌。"
   HIM.10.a: "加入魔族"

   # ==================== HJM 事件（主线） ====================
   HJM.1.t: "MC帝国之始"
   HJM.1.d: "MC帝国，这古老而神秘的沙盒帝国，其命运如今系于你手。雄心勃勃却垂垂老矣的人皇Notch，他承载着MC帝国的未来，你将抉择MC帝国的航向。魔族的威胁仍旧存在，一些自称“迷你”的异族人对MC领土亦是虎视眈眈。你的每一个选择都将深刻影响MC帝国的未来。现在，是时候做出你的决策了！MC帝国必将繁荣昌盛！"
   HJM.1.a: "帝国万岁！"

   HJM.2.t: "地下动乱"
   HJM.2.d: "地下的火并不是今日才燃起来的。早在帝国还沉睡于承平旧梦之时，矿道深处便已有低语流转。那些被征服、被归化、被编入册籍的灰皮部众，表面向帝国缴税，背后却仍记得林地府邸的旧旗；那些守着村庄边界的老兵，白日里说天下太平，夜里却听见地底传来脚步。旧档案把这件事称为地下动乱，仿佛只是一场税吏与乡勇能够压下的小乱。可史官后来重翻案卷，才发现这正是大祸最早的影子：帝国的墙还在，墙下的根却已经空了。镇压也好，谈判也罢，都只是给即将到来的风暴添上一枚印记。帝国若以为天下仍可按旧法裁断，便是把烽烟当炊烟，把战鼓当暮钟。今日保留此案，不为旧事，只为提醒后人：山雨未至时，最先潮湿的，往往是地下。\n\n后来史官整理这一阶段的案卷时，总会在页边写下同一句话：帝国并非突然跌入战争，它是在一次次轻忽、一次次迟疑、一次次把狼烟误作炊烟之后，才发现黑暗已经走到门前。此事之所以重要，不在它当日造成多少伤亡，而在它把帝国从承平旧梦里撬开一道缝。缝隙越小，越容易被朝堂忽略；可风暴正是从这些缝隙里灌进来，吹灭旧日太平，也吹醒尚未披甲的儿郎。那些后来奔赴前线的人，最早听见的并不是战鼓，而是地下深处含混不清的回声。帝国的黄昏，正从这里开始。"
   HJM.2.a: "镇压动乱"
   HJM.2.b: "谈判解决"

   HJM.3.t: "边境异常"
   HJM.3.d: "边境村庄的报告已经堆满了军务厅的长案。[Root.GetLeader]，这不再是哪个乡老惊慌失措的闲言，也不是哪支巡逻队误把夜色看成敌影。牲畜在夜里无声失踪，井边留下焦黑的爪痕；哨塔的火把一夜未灭，守军却像被阴影吞去，连一声呼救都没有留下。东区巡逻队在泥地里发现了脚印，人形，却比任何村民都更沉，像有什么东西从下界的灰烬中踏入主世界。地方驻军请求提高警戒，文书上的措辞仍然克制，只写异常二字，可送信的骑手满身泥水，双手抖得握不住缰绳。帝国习惯了太平，习惯了把边境小乱交给村长、铁匠和几名弓手处理；但这一次，风从林地府邸吹来，从废矿道吹来，从无人敢提起的旧唱片里吹来。若仍以寻常苦力怕、寻常盗匪视之，便是拿帝国儿郎的性命去赌敌人的仁慈。警钟必须敲响，烽燧必须点燃，边境每一座村庄都要知道：外面有东西，而且它正朝我们走来。\n\n后来史官整理这一阶段的案卷时，总会在页边写下同一句话：帝国并非突然跌入战争，它是在一次次轻忽、一次次迟疑、一次次把狼烟误作炊烟之后，才发现黑暗已经走到门前。此事之所以重要，不在它当日造成多少伤亡，而在它把帝国从承平旧梦里撬开一道缝。缝隙越小，越容易被朝堂忽略；可风暴正是从这些缝隙里灌进来，吹灭旧日太平，也吹醒尚未披甲的儿郎。"
   HJM.3.a: "批准警戒。外面有东西。"
   HJM.3.b: "可能只是野生的苦力怕。不必惊动村民。"

   HJM.4.t: "灰皮人的密信"
   HJM.4.d: "监视网终于收回了第一批线索，却没有给帝国带来半分安宁。截获站从灾厄村民前哨截下一份密信，外封仍用帝国归化部落的旧印，内文却以陌生符号层层加密。译员熬了三夜，只破出几段残句：坐标、村庄、传送门、旧王之名。最可怕的不是这些词本身，而是它们的语气。这不是求援，不是试探，更不是孤立密谋；它像一封回信，像臣属向久别的主人复命。也就是说，在我们还以为灰皮人只是边疆旧患时，他们已经与某个黑暗中的旗帜往返通信了数月，甚至更久。帝国给他们土地、盐粮和名册，他们却把我们的村庄画成献祭图，把巡逻路线交给敌人，把主世界的门闩一寸寸松开。朝堂可以继续辩论归化是否失败，军务厅却不能再等。假定一切情报皆已泄露，假定每一处林地府邸都是敌人的眼睛，假定每一名沉默的灾厄村民都在等待号令。帝国不惧阴谋，只怕自己醒得太迟。现在，灰皮人的密信已经摆在案上，余下的问题只有一个：我们是把他们重新翻作棋子，还是连棋盘一并掀翻？\n\n后来史官整理这一阶段的案卷时，总会在页边写下同一句话：帝国并非突然跌入战争，它是在一次次轻忽、一次次迟疑、一次次把狼烟误作炊烟之后，才发现黑暗已经走到门前。此事之所以重要，不在它当日造成多少伤亡，而在它把帝国从承平旧梦里撬开一道缝。缝隙越小，越容易被朝堂忽略；可风暴正是从这些缝隙里灌进来，吹灭旧日太平，也吹醒尚未披甲的儿郎。"
   HJM.4.a: "他们两边下注。假定我方一切情报都已泄露。"
   HJM.4.b: "也许可以策反他们。双面间谍可以再被翻一次。"

   HJM.5.t: "那个被抹去的名字"
   HJM.5.d: "情报报告被放上议会长桌时，满堂文武无人先开口。那些白眼的目击记录、那些不合常理的亡灵队列、那些从下界灰烬里传来的命令，如今终于指向同一个名字。Herobrine。这个名字曾被从宫廷记事中抹去，被从村庄传说中改写成吓唬孩童的故事，被从[Root.GetLeader]的口中封存多年。可历史不会因为沉默而死，旧血也不会因为不被提起便不再沸腾。边境之外集结的不是普通魔族，不是几群失控的僵尸、骷髅和烈焰人，而是一支重新学会服从的军队。它们不再像兽群那样扑向火光，而像军阵那样等待鼓点；它们不再为饥饿而来，而为旗帜而来。议会必须承认，帝国面对的不是叛乱，不是盗匪，不是山林鬼魅，而是战争。更残酷的是，这场战争带着家族旧恨、世界旧怨和被帝国埋葬的名字一同归来。称呼决定态度，态度决定生死。若仍把它叫边境骚乱，帝国便会以县尉之手迎接灭国之兵。该叫什么就叫什么：这是战争。\n\n后来史官整理这一阶段的案卷时，总会在页边写下同一句话：帝国并非突然跌入战争，它是在一次次轻忽、一次次迟疑、一次次把狼烟误作炊烟之后，才发现黑暗已经走到门前。此事之所以重要，不在它当日造成多少伤亡，而在它把帝国从承平旧梦里撬开一道缝。缝隙越小，越容易被朝堂忽略；可风暴正是从这些缝隙里灌进来，吹灭旧日太平，也吹醒尚未披甲的儿郎。"
   HJM.5.a: "该叫什么就叫什么。这是战争。"

   HJM.6.t: "方外来客"
   HJM.6.d: "方外来客抵达首都那日，城门守军先以为只是几名风尘仆仆的旅人。他们没有诸侯使节的仪仗，没有王庭贵族的徽章，甚至能在人群里像普通村民一样沉默站立。可当他们抬眼望向城墙、工坊、红石线路和帝国军营时，所有人都感到一种异样：他们看这方世界，不像臣民看故土，也不像商旅看道路，而像工匠看一张可被拆解、重组、优化的工作台。有人说他们能死而复生，有人说他们曾在无数世界里起城、伐木、屠龙、开矿；有人说他们根本不是帝国可以理解的客人，而是从规则之外走来的玩家。协议最终签署。穿越者愿为帝国作战，愿以自己的经验、奇术与不合常理的战法对抗Herobrine；作为交换，他们要求在帝国内享有特殊权力，要求进入军队、工坊和议事厅。老臣们皱眉，武将们沉默，年轻军官却看见了胜机。帝国的剑又多了一柄，但剑锋太利，握柄也未必永远朝向帝国。签署之前，穿越者代表只问了一句：敌人在哪？满堂文武由此明白，新的力量已经入局。\n\n从这一刻起，帝国的战争不再只是前线将军的战争。它进入村庄，进入矿道，进入铁匠铺和红石实验室，进入每一个还以为自己能够置身事外的人心里。史官后来写道，真正改变帝国的并非某一场战斗的胜负，而是这些命令如何把散落的村庄、迟疑的官署、愤怒的士兵和方外的锋刃重新拧成一股力。那股力足以扫平敌人，也足以在胜利后撕裂自身；只是当时无人愿意往后看，所有人只看见剑锋向前。"
   HJM.6.a: "欢迎来到主世界。"

   HJM.7.t: "围城"
   HJM.7.d: "围城来得比所有沙盘推演都更早。黄昏时分，第一批僵尸越过边境，它们没有像旧日怪物那样四散扑火，也没有被村庄灯光诱得失去方向；它们排成波次，踩着同一节奏，像被看不见的军鼓驱赶。入夜之后，骷髅弓手占住林线，蜘蛛攀上屋脊，苦力怕被驱向木门与粮仓。午夜未至，三座边境村庄已被围成孤岛。铁傀儡在村口撑住阵线，一拳砸碎十具尸骨，自己也被箭矢和爆炸剥去铁皮；红石大炮连续开火，电路烧到发黑，工匠用湿布裹着手继续接线。村民们没有退路，身后是床铺、麦田、孩子和祖坟。黎明时分，尸潮终于退去，村庄仍然屹立，钟楼上的旗帜被烧去一角，却没有落下。可所有人都知道，胜利只是暂时的，围城只是开场。帝国没有开第一枪，魔族却已经把战争送到每一户门前。儿郎们，从此以后，边境没有平民，只有尚未披甲的守土之人。\n\n从这一刻起，帝国的战争不再只是前线将军的战争。它进入村庄，进入矿道，进入铁匠铺和红石实验室，进入每一个还以为自己能够置身事外的人心里。史官后来写道，真正改变帝国的并非某一场战斗的胜负，而是这些命令如何把散落的村庄、迟疑的官署、愤怒的士兵和方外的锋刃重新拧成一股力。那股力足以扫平敌人，也足以在胜利后撕裂自身；只是当时无人愿意往后看，所有人只看见剑锋向前。"
   HJM.7.a: "他们出了招。轮到我们了。"

   HJM.8.t: "外来的指挥官"
   HJM.8.d: "第一批穿越者军官进入帝国指挥链时，军务厅的空气像凝住的铁。老将们把抗议信递上长桌，言辞恳切而锋利：帝国儿郎岂能听命于方外之人？百年军制岂能交给不知宗庙、不识田畴、不曾在村庄长大的人？他们说得并非没有道理。穿越者不敬旧礼，不熟官阶，甚至常以令人难堪的直白评价帝国军队的阵线、补给和建筑布局。可同样是这些人，把第三边防师的集合时间缩短了一半，把红石信号接进前线哨塔，把地形、复活、传送门与高地控制写成帝国军事学院从未有过的新科目。战场不会因为血统而饶恕迟钝，也不会因为礼法而奖励忠诚。帝国若只凭旧将旧法，便只能以热血填尸潮；若借穿越者之锋，又必须承认锋刃之外还有握柄。争论持续到深夜，抗议信最终仍躺在议会桌上，无人翻阅。不是因为老将们错了，而是因为魔族不会等帝国把礼制辩完。战果比军衔更有说服力，火线比祠堂更懂得选择谁来指挥。\n\n从这一刻起，帝国的战争不再只是前线将军的战争。它进入村庄，进入矿道，进入铁匠铺和红石实验室，进入每一个还以为自己能够置身事外的人心里。史官后来写道，真正改变帝国的并非某一场战斗的胜负，而是这些命令如何把散落的村庄、迟疑的官署、愤怒的士兵和方外的锋刃重新拧成一股力。那股力足以扫平敌人，也足以在胜利后撕裂自身；只是当时无人愿意往后看，所有人只看见剑锋向前。"
   HJM.8.a: "战果比军衔更有说服力。"
   HJM.8.b: "老将们有道理。限制穿越者的指挥权。"

   HJM.9.t: "穿越地狱门"
   HJM.9.d: "黑曜石框架在夜色中立起，紫色光晕像一面不属于主世界的旗。突击部队列队于门前，盔甲被光照得忽明忽暗，许多士兵第一次真正明白，所谓下界并不是传说里的远方，而是一步之外的战场。穿越者指挥官为这一刻训练了数周，他们把地图钉满墙壁，把传送门另一端的落点反复推算，把速度、混乱和出其不意写进每一条军令。帝国老将原本不信这种打法。堂堂王师，岂能放弃正面战线，钻入敌巢腹地？可穿越者只回答：若敌人把门开在我们村庄前，我们也能把门开在他们心口上。计划中有许多帝国军语无法翻译的词，其中最刺耳的是蹲出生点。老将们不懂其意，却看懂了其狠：不是击退敌人，而是在敌人重新组织之前，把它们诞生、集结、补给和逃回黑暗的地方全部钉死。儿郎们，点燃传送门吧。让Herobrine知道，帝国并非只会守墙；帝国也会开门，也会奇兵暗度，也会把剑锋送进下界的咽喉。\n\n从这一刻起，帝国的战争不再只是前线将军的战争。它进入村庄，进入矿道，进入铁匠铺和红石实验室，进入每一个还以为自己能够置身事外的人心里。史官后来写道，真正改变帝国的并非某一场战斗的胜负，而是这些命令如何把散落的村庄、迟疑的官署、愤怒的士兵和方外的锋刃重新拧成一股力。那股力足以扫平敌人，也足以在胜利后撕裂自身；只是当时无人愿意往后看，所有人只看见剑锋向前。"
   HJM.9.a: "点燃传送门。行动开始。"

   HJM.10.t: "前线整肃"
   HJM.10.d: "前线整肃并不是一次简单的军纪检查，而是帝国从迟疑中拔剑的时刻。开战以来，边境各军既有奋勇赴死者，也有观望保存者；既有村庄自发集结的义勇，也有仍按承平旧例行文请示的官署。命令一层层下达，旧的拖延被压下，含混的目标被撕碎，凡守土者必须明白自己为何而战，凡掌兵者必须知道退路已经被村庄、麦田与祖坟堵死。整肃之后，军旗重新编号，补给重新分派，溃兵被编回队列，畏战者被押至军前宣读战令。帝国不再容许每座村庄各自为战，也不再容许将领以谨慎之名坐看边地流血。有人说此举严苛，有人说战时本该如此。史官后来写下这一页时，只记了八个字：旧梦已碎，军令如山。帝国儿郎们，继续推进吧。魔族用尸潮教会我们何为战争，我们便用纪律、铁拳和锋芒回答它们：主世界不是可供践踏的猎场，帝国也不是任人围困的老城。\n\n从这一刻起，帝国的战争不再只是前线将军的战争。它进入村庄，进入矿道，进入铁匠铺和红石实验室，进入每一个还以为自己能够置身事外的人心里。史官后来写道，真正改变帝国的并非某一场战斗的胜负，而是这些命令如何把散落的村庄、迟疑的官署、愤怒的士兵和方外的锋刃重新拧成一股力。那股力足以扫平敌人，也足以在胜利后撕裂自身；只是当时无人愿意往后看，所有人只看见剑锋向前。"
   HJM.10.a: "继续推进。"

   HJM.11.t: "演说"
   HJM.11.d: "指挥官站上临时搭起的木台时，前线营地正下着冷雨。军官们披着湿透的斗篷，士兵们站在泥水里，远处还能听见下界裂口传来的低吼。没有乐队，没有华盖，没有朝堂上惯有的礼仪；只有一张被雨水泡胀的作战桌，桌上插着标记敌军的红旗。指挥官从墙上取下一把钻石剑，剑锋映出每个人疲惫的脸。他没有念长篇文书，也没有许诺轻易的胜利，只把剑尖钉入地图，说：尊严只在剑锋之上。那一刻，所有人都明白这句话不是修辞。帝国若退，村庄便成坟场；帝国若忍，魔族便会把中原视作猎场；帝国若还想被称为帝国，就必须用敌人的血回答敌人的火。天亮之前，前进命令送达每一个师。工兵修桥，炮兵装药，步兵检查最后一支箭。儿郎们，举起锋芒吧。尊严不是朝堂赏赐的匾额，不是旧史书里泛黄的词句，而是剑锋推出去的边界，是尸山血海里仍不肯跪下的脊梁。\n\n从这一刻起，帝国的战争不再只是前线将军的战争。它进入村庄，进入矿道，进入铁匠铺和红石实验室，进入每一个还以为自己能够置身事外的人心里。史官后来写道，真正改变帝国的并非某一场战斗的胜负，而是这些命令如何把散落的村庄、迟疑的官署、愤怒的士兵和方外的锋刃重新拧成一股力。那股力足以扫平敌人，也足以在胜利后撕裂自身；只是当时无人愿意往后看，所有人只看见剑锋向前。"
   HJM.11.a: "向前。"

   HJM.12.t: "帝国总动员"
   HJM.12.d: "《全面战争法案》通过时，议会厅没有掌声。所有人都知道，这不是一次普通表决，而是帝国把自己的血肉、矿车、麦田、工坊和村庄一并押上战场。民用工厂开始转产，织布机旁堆起绷带和军服，铁匠铺的炉火从黄昏烧到天明；红石工程师被编入军需署，村庄教师改教识图与急救，矿工登记为工兵，农夫在收割之后领取长矛和弩。每一个适龄村民都将接受训练，每一座村庄都要学会储粮、修墙、报信和守夜。有人问，帝国是否还能承受这样的动员？可更该问的是，若帝国不如此动员，主世界还能不能承受魔族的胜利。全面战争不是一句口号，而是让天下每一盏灯都为前线而亮，让每一块铁都知道自己终将成为盾、剑、炮管或铁傀儡的骨。帝国不再是一个处于战争中的国家。它是一场恰好拥有国土、百姓和旗帜的战争。儿郎们，一切为了胜利；胜利之外，再无退路。\n\n从这一刻起，帝国的战争不再只是前线将军的战争。它进入村庄，进入矿道，进入铁匠铺和红石实验室，进入每一个还以为自己能够置身事外的人心里。史官后来写道，真正改变帝国的并非某一场战斗的胜负，而是这些命令如何把散落的村庄、迟疑的官署、愤怒的士兵和方外的锋刃重新拧成一股力。那股力足以扫平敌人，也足以在胜利后撕裂自身；只是当时无人愿意往后看，所有人只看见剑锋向前。"
   HJM.12.a: "一切为了胜利。"

   HJM.13.t: "下界的帝国旗帜"
   HJM.13.d: "第一面帝国旗帜插上下界要塞城墙时，岩浆海没有因此熄灭，烈焰人的火也仍在燃烧，但所有亲眼看见那面旗的人都明白，战争已经越过一个分水岭。曾经只有魔族能从这里走向主世界，如今帝国儿郎也踏过传送门，把圆石、红石、铁甲和军号带进了敌人的巢穴。要塞外，凋零骷髅守备队四散奔逃；要塞内，烈焰人的制造厂无人看管，黑石廊道里堆满未发出的军令。在最深处，突击队发现一间指挥室，墙上钉满主世界地图，村庄、矿道、粮仓与桥梁都被恶魂之泪标记。敌人不是一时兴起，它们早已打算把我们的家园一口口吞下。士兵们沉默良久，随后把地图卷起送回帝国，把帝国旗帜钉得更深。战争没有结束，Herobrine也没有倒下，但这是第一次，前线开始谈论回家，不是因为害怕，而是因为他们终于相信自己能带着胜利回家。帝国为答案而来，带着火光与旗帜离开。\n\n从这一刻起，帝国的战争不再只是前线将军的战争。它进入村庄，进入矿道，进入铁匠铺和红石实验室，进入每一个还以为自己能够置身事外的人心里。史官后来写道，真正改变帝国的并非某一场战斗的胜负，而是这些命令如何把散落的村庄、迟疑的官署、愤怒的士兵和方外的锋刃重新拧成一股力。那股力足以扫平敌人，也足以在胜利后撕裂自身；只是当时无人愿意往后看，所有人只看见剑锋向前。"
   HJM.13.a: "我们为答案而来，带着胜利离开。"

   HJM.14.t: "村庄防御网建成"
   HJM.14.d: "边境防御网建成的消息传回首都时，军务厅终于有了一份不以伤亡开头的报告。工程队沿着村庄外缘立起圆石墙，哨塔在麦田尽头投下狭长影子，壕沟里引入溪水，木门之后又加铁门，钟楼顶端接入红石警报。每一座村庄都被重新测绘，每一条小路都标注了可埋伏、可撤退、可纵火阻敌的位置。孩子们被教会听见钟声便进入地窖，铁匠们学会在夜里分发备用弩，村长们第一次拿到军用地图，明白自己不只是管税粮的人，也是一座小小城池的守将。地方驻军指挥官报告：若再遭突袭，每一座村庄至少能够独自支撑三日。三日，听来短促，却足以让援军赶到，足以让敌人的快攻变成攻坚，足以让一个本该被尸潮吞没的村庄等到天亮。帝国的长城不只修在山口，也修在每一户门前。让魔族来试试吧。每一座村庄都是一座要塞，每一个村民都是守土之人。\n\n这些看似内政与军工的事务，后来都被证明是战争叙事的一部分。没有城墙，儿郎便要用血肉堵门；没有铁傀儡，村庄便只能听天由命；没有红石火力，帝国的愤怒便只能停在口号里。帝国的复兴从来不只在朝堂，不只在战报，也在每一块被搬上城墙的圆石、每一把被磨亮的弩、每一道亮起又熄灭的红石信号中。它们共同告诉天下：主世界仍有组织，仍有工匠，仍有不肯把家园交给黑暗的手。"
   HJM.14.a: "让魔族来试试。每一座村庄都是一座要塞。"

   HJM.15.t: "铁傀儡兵团就位"
   HJM.15.d: "第一批量产铁傀儡走出工坊时，围观的村民没有欢呼，反而安静得像在观看某种古老誓约的重铸。它们不说话，不吃粮，不索军饷，也不问敌人为何而来；它们只是站在村口，铁臂垂下，眼中红光沉默燃烧，像一堵会行走的城墙。帝国把村子里的铁铸成护卫，把工匠的汗水铸进关节，把每一户人家对夜袭的恐惧铸成拳头。有人说看见一具铁傀儡单手掀翻矿车，有人说它在尸潮中站到天亮，脚下堆满白骨而一步未退。故事未必全真，可帝国需要这样的故事。因为士气有时也要像铁一样被反复锻打，直到软弱被烧尽，直到每个村民看见村口的铁影，便知道自己不是孤军。魔族可以驱使不知疲倦的尸潮，帝国也能铸出不知恐惧的铁拳。不要停下，直到钢铁成为长城；不要停下，直到每一个夜晚都有铁傀儡替孩子守门。\n\n这些看似内政与军工的事务，后来都被证明是战争叙事的一部分。没有城墙，儿郎便要用血肉堵门；没有铁傀儡，村庄便只能听天由命；没有红石火力，帝国的愤怒便只能停在口号里。帝国的复兴从来不只在朝堂，不只在战报，也在每一块被搬上城墙的圆石、每一把被磨亮的弩、每一道亮起又熄灭的红石信号中。它们共同告诉天下：主世界仍有组织，仍有工匠，仍有不肯把家园交给黑暗的手。铁拳立在村口，帝国的心便还没有碎。"
   HJM.15.a: "不需要军饷的士兵，是最好的士兵。"

   HJM.16.t: "红石军事实验室"
   HJM.16.d: "帝国军事红石研究所成立于首都地下，一座废弃矿井被改造成灯火通明的试验场。过去，红石点亮矿车轨道、驱动农田机关、让远方的灯在夜里亮起；如今，帝国要它学会战争。最聪明的工程师们挤在石壁之间，用红石粉、中继器、比较器和活塞搭建从未有人尝试过的电路。他们争论延迟，计算射角，测试信号衰减，把一块块TNT放进沙盘，像古代匠人第一次把青铜浇进剑模。有人担心红石不该成为武器，担心帝国会因此失去旧日温和；可前线的村庄正在燃烧，铁傀儡正在损毁，孩子们正在地窖里听尸潮敲门。红石若只能照亮宫殿，却不能照亮战场，那便辜负了矿脉深处的赤色光芒。研究所的核心课题只有一个：如何让TNT在精确的时间，落在精确的地点；如何让帝国的怒火不再只是儿郎的血，而成为可计算、可重复、可轰鸣的真理。红石不是武器，红石是答案。\n\n这些看似内政与军工的事务，后来都被证明是战争叙事的一部分。没有城墙，儿郎便要用血肉堵门；没有铁傀儡，村庄便只能听天由命；没有红石火力，帝国的愤怒便只能停在口号里。帝国的复兴从来不只在朝堂，不只在战报，也在每一块被搬上城墙的圆石、每一把被磨亮的弩、每一道亮起又熄灭的红石信号中。它们共同告诉天下：主世界仍有组织，仍有工匠，仍有不肯把家园交给黑暗的手。"
   HJM.16.a: "红石不是武器。红石是答案。"

   HJM.17.t: "第一门红石火炮"
   HJM.17.d: "帝国第一门红石大炮在清晨完成试射。天还未亮，试验场外便站满了工程师、军官、矿工和从前线归来的伤兵。目标是一座废弃下界传送门框架，黑曜石在雾中像一块旧伤疤。信号启动时，红石线一节节亮起，中继器发出细小而急促的声响，随后TNT被抛上半空，拖着火光越过山坡。爆炸落点距离目标不到三格。烟尘散去后，在场众人沉默了很久，不是因为失望，而是因为他们意识到，自己刚刚看见了这个世界从未存在过的东西。过去，帝国依靠城墙、铁傀儡、弓弩和村民儿郎的血肉抵挡黑暗；从今天起，帝国拥有了火力，拥有了能把敌人阻在村庄之外、把下界门框炸成碎石的远方之拳。炮兵军官把试射记录收入铁盒，工程师们则立刻开始争论下一门炮的射程。世界上只有两种人，炮兵和他的目标。射程范围内，帝国的火炮就是真理。\n\n这些看似内政与军工的事务，后来都被证明是战争叙事的一部分。没有城墙，儿郎便要用血肉堵门；没有铁傀儡，村庄便只能听天由命；没有红石火力，帝国的愤怒便只能停在口号里。帝国的复兴从来不只在朝堂，不只在战报，也在每一块被搬上城墙的圆石、每一把被磨亮的弩、每一道亮起又熄灭的红石信号中。它们共同告诉天下：主世界仍有组织，仍有工匠，仍有不肯把家园交给黑暗的手。"
   HJM.17.a: "从今天起，帝国拥有了火力。"

   HJM.18.t: "异域来讯"
   HJM.18.d: "外交部派往边境之地的侦察队带回了令人震惊的报告。他们在远离村庄、矿道和帝国驿路的荒原上检测到一段信号：重复、结构化、带有明确意图，不像风声，不像岩浆流动，也不像灾厄村民的哨语。信号从更远的维度边缘传来，像有人站在世界之外，一下一下敲击主世界的门。过去，帝国把方外视为传说，把穿越者视为怪谈，把边境之外看作地图上尚未涂色的空白；可战争逼迫帝国承认，世界并不止我们脚下这一块土地。下界可以伸出魔族，末地可以卷入乱局，方外也可能带来盟友、刀剑、规则之外的眼睛。外交部建议立刻派遣正式使团，军务厅则要求同步派出护卫与测绘队。有人担心这是陷阱，有人担心引狼入室，但更大的危险是闭门等死。帝国若要扫平黑暗，便不能只看见城墙内的灯火。找到他们，不管他们在世界的哪一个角落；若是朋友，便缔约并肩；若是敌人，便让他们记住帝国之名。\n\n这些看似内政与军工的事务，后来都被证明是战争叙事的一部分。没有城墙，儿郎便要用血肉堵门；没有铁傀儡，村庄便只能听天由命；没有红石火力，帝国的愤怒便只能停在口号里。帝国的复兴从来不只在朝堂，不只在战报，也在每一块被搬上城墙的圆石、每一把被磨亮的弩、每一道亮起又熄灭的红石信号中。它们共同告诉天下：主世界仍有组织，仍有工匠，仍有不肯把家园交给黑暗的手。"
   HJM.18.a: "找到他们。不管他们在世界的哪一个角落。"

   HJM.19.t: "消失的哨兵"
   HJM.19.d: "边境警戒令下达后的第三个夜晚，第七哨塔失去联系。它原本只是群山之间一座寻常石塔，守着两条小路和三座村庄的夜色；可当传令钟迟迟不响，最近的巡逻队便知道事情已经不对。救援队抵达时，塔内火把仍然燃着，床铺整齐，锅里还有未凉透的汤，武器架上的弓弩没有被打开。没有搏斗痕迹，没有尸体，没有血迹，甚至没有脚印离开。只有瞭望台边缘留下几道焦黑抓痕，像某种炽热的手从阴影里探出，把守军一个个拖进夜色。随队军官在报告中写道：此事非寻常盗袭，亦非野兽所为。可这句冷静的官样话背后，是所有边境士兵都听懂的寒意。若敌人能无声夺走一座哨塔，便能无声接近一座村庄；若黑暗能从墙外伸手，便说明帝国还没有看见真正的战场。派出侦察队，找到答案。哪怕答案来自下界，哪怕答案指向那个被抹去的名字，帝国也必须看清它。\n\n侦察链的意义正在于此：它没有立刻带来胜利，却让帝国学会承认危险的形状。一个衰老的国家最可怕的病，不是敌人强大，而是看见敌人时仍愿自欺。第七哨塔、灰烬脚印、午夜密语，这些零碎线索像钉子一样钉进帝国案头，逼迫朝堂承认边境已经不是边境，传说已经不是传说。儿郎们后来的冲锋，正是从这些看似细小的证据里获得理由：我们不是为了幻影而战，我们是在为每一座被标记的村庄先发制人。"
   HJM.19.a: "派出侦察队，找到答案。"

   HJM.20.t: "灰烬中的脚印"
   HJM.20.d: "侦察队沿着第七哨塔外的痕迹深入林地，起初只有折断的枝条和被踩碎的蘑菇，后来便出现了一串雨水也冲不掉的脚印。它们不像僵尸，僵尸拖沓；不像灾厄村民，灰皮人的靴印更窄；也不像任何已知的主世界生物。每一步都深深陷入泥土，边缘焦黑，脚印旁的草叶被烤干，泥里混着细碎灰烬，带着下界独有的硫火气味。侦察兵越往前走越沉默，直到他们在一处废弃传送门旁发现被刻进石面的符号。译员无法完全读懂，只认出几个反复出现的含义：集结、归来、门。军官们终于承认，这不是普通边境骚乱，不是归化部落作乱，也不是哪群怪物被夜色驱赶到村庄附近。有什么东西正在从下界伸出手，试探帝国的墙是否还硬，试探主世界是否仍有胆量回应。把报告送回首都吧。让朝堂那些仍沉醉于承平旧梦的人看看，灰烬已经落到帝国案前。\n\n侦察链的意义正在于此：它没有立刻带来胜利，却让帝国学会承认危险的形状。一个衰老的国家最可怕的病，不是敌人强大，而是看见敌人时仍愿自欺。第七哨塔、灰烬脚印、午夜密语，这些零碎线索像钉子一样钉进帝国案头，逼迫朝堂承认边境已经不是边境，传说已经不是传说。儿郎们后来的冲锋，正是从这些看似细小的证据里获得理由：我们不是为了幻影而战，我们是在为每一座被标记的村庄先发制人。"
   HJM.20.a: "把报告送回首都。"

   HJM.21.t: "不属于村庄的密语"
   HJM.21.d: "午夜时分，截获站捕捉到一段断续信号。值班译员起初以为只是灾厄村民的短促哨声，可第二遍回放时，所有人都听见了隐藏其下的节拍：像骨骼相撞，像石镐敲击黑曜石，像某种低沉回声从很深的地方一下一下传来。信号被送往首都，译员们用整夜时间拆解，只破出零散坐标和几个危险词语。坐标指向帝国村庄，指向粮仓，指向哨塔，指向桥梁；词语则指向门、火、尸潮与等待。有人正在标记目标，有人在为下一次进攻铺路，有人把帝国熟悉的田埂、水井和钟楼写成敌军地图上的红点。更令人愤怒的是，信号中夹杂着灾厄村民的旧哨语，说明内线仍在活动，说明帝国用仁德收编的灰皮人中，仍有人愿意把主世界卖给黑暗。把所有边境村庄列入警戒名单。不要再问风暴会不会来，它已经在数我们的门牌。帝国若要活下去，就必须比敌人更快醒来。\n\n侦察链的意义正在于此：它没有立刻带来胜利，却让帝国学会承认危险的形状。一个衰老的国家最可怕的病，不是敌人强大，而是看见敌人时仍愿自欺。第七哨塔、灰烬脚印、午夜密语，这些零碎线索像钉子一样钉进帝国案头，逼迫朝堂承认边境已经不是边境，传说已经不是传说。儿郎们后来的冲锋，正是从这些看似细小的证据里获得理由：我们不是为了幻影而战，我们是在为每一座被标记的村庄先发制人。"
   HJM.21.a: "把所有边境村庄列入警戒名单。"

   # ==================== HJM 事件（附庸/战后） ====================







   # ==================== HJM 事件（觉醒/投降/交接/路线） ====================
   HJM.30.t: "人皇口谕"
   HJM.30.d: "宫门洞开。人皇 Notch 走出了深锁百年的高墙，走出层层仪仗，走进城边一座满是泥水与伤兵的村庄。没有金殿，没有万民山呼，只有烧焦的麦田、倒塌的钟楼、扶着断臂站起的村民，以及从前线一路退回来的疲惫儿郎。这是百年来人皇第一次真正亲临人间。老人们认出他时先是沉默，随后有人跪下，有人哭，有人把孩子举过头顶，让他看看这个他们只在故事里听过的君主。Notch没有让他们跪太久。他站在泥泞广场上开口，声音不高，却像红石信号穿过整个主世界。一字一句，如若千钧：帝国不是城墙，不是王冠，不是宫廷谱牒；帝国是每一座仍在敲钟的村庄，是每一个还肯握剑的儿郎，是被魔族烧过仍要重新播种的土地。人皇没有许诺太平，也没有粉饰败局。他说敌人已经越过边境，说帝国丢地失师，说若今日不醒，明日便没有主世界可守。演讲结束时，广场静得只剩呼吸声。人们不再跪着献忠，他们抬起头，脊梁像要冲破重云。这个沉睡百年的帝国，从梦里被硬生生喊醒。谁也没有说这是回光返照，谁也不愿这样想。至少此刻，帝国醒了；至少此刻，儿郎们眼中的火足以照亮前线。\n\n这一刻是帝国悲剧的伏笔。表面上，它写的是人皇亲临、睡狮苏醒与战时动员；更深处，它写的是一个衰老国家对强人意志的最后依赖。Notch仍在，天下便能暂时相信裂缝可以被王冠压住；可这份相信越炽烈，越说明制度本身已经无法独自站稳。史官不敢在当时直言回光返照，只能把疑问藏在钟声、火光和儿郎们重新抬起的眼睛里。"
   HJM.30.a: "恭听人皇口谕，帝国苏醒了！"

   HJM.31.t: "国都沦陷"
   HJM.31.d: "国都沦陷的消息传来时，最先沉默的是钟楼。那座曾经每逢节庆便响彻全城的钟，如今被炮火震裂，悬在半塌的梁上，像帝国最后一口尚未咽下的气。城门被攻破，街垒被逐段清除，守军从宫墙退到广场，又从广场退到议事厅前。最后一面旗帜倒下时，没有人再争论战术得失，也没有人再递交请援文书。首都不是一座普通城市，它是道路、名册、税粮、军令、宗庙和旧梦的汇合处；当它陷落，远方的部队会怀疑命令是否还有效，边境的村庄会怀疑援军是否还存在，附庸与敌人都会嗅到王朝血气里的裂缝。这个国家并非没有士兵，亦非没有武器，却已经在象征上被击穿。战争意志随着城头旗帜一同坠落，像一支断弦的弓，再也无法把帝国的力量射向前方。黄昏已至。若后人还要在废墟上寻找教训，便该记住：国都沦陷从来不只是一城一地的得失，它是天下人第一次敢问，帝国是否还配被称为帝国。\n\n这一刻不是胜利的阴影，而是失败本身。它证明帝国的衰老并非传言，也证明人皇亲临不能立刻补上所有裂缝。若帝国还能从废墟中醒来，那份觉醒也不会是轻松的凯旋，而会带着国都陷落后的羞辱、恐惧与血债。史官后来重读这一页时才明白：黄昏并不总是终点，有时也是一场更残酷动员的开始。"
   HJM.31.a: "黄昏已至"

   HJM.32.t: "摄政时代"
   HJM.32.d: "人皇既崩，帝国不可一日无主。讣告送达首都时，宫门外没有战鼓，只有从各地赶来的旧臣、将领、穿越者代表和沉默的村民。Notch 在时，所有矛盾都被他压在王冠之下：保皇党相信正朔，村庄相信人皇，穿越者相信协约，军队相信胜利后的帝国仍能给出方向。可强人一去，压在王冠下的裂缝便一条条露出光来。Jeb 被旧臣簇拥，宣称延续 Notch 的法统；菲尔·斯宾塞则以摄政之名进入议事厅，拿出协约、战时授权与战后重建方案，证明自己才有能力让这个庞大而疲惫的帝国继续运转。四色窗徽第一次悬挂在旧王冠旁边，光泽冰冷，却比任何祭文都更接近权力。百姓只听见公告说临时摄政，官员却看见印玺换了案头，军官看见命令换了签名，穿越者看见他们曾经借给帝国的剑，终于学会了握住帝国本身。摄政时代降临了。它表面是秩序的延续，实则是发酵的开始。人皇能把天下聚成一拳，摄政王却只能用制度、利益与恐惧维持那只拳头不立刻散开。\n\n这一段是帝国悲剧的骨节。表面上，它写的是觉醒、裁决、摄政与秩序重建；更深处，它写的是强人、战争和制度之间无法解开的结。Notch在时，帝国可以把分裂的力量聚成一拳；Notch不在，拳头里的每一根手指都会记起自己的方向。胜利没有终结矛盾，只是让矛盾披上凯旋的外衣继续发酵。史官不敢在当时直言盛极而衰，只能把伏笔藏在钟声、印玺和沉默里，等后人自己读懂。"
   HJM.32.a: "啊，是摄政王来了"

   HJM.33.a: "（系统）"

   HJM.34.t: "雷霆雨露"
   HJM.34.d: "雷霆雨露，俱是天恩。拔除爪牙之后，仆从国的命运被呈上帝国长案，像一排等待判决的头颅。它们曾为 Herobrine 开路，曾把魔族军队引向主世界，曾在帝国边境燃起烽火；可它们也有城池、工坊、矿道和无数被裹挟的臣民。于是朝堂分裂为两种声音。温和派说，王师所至，当以帝国法度重编秩序，不焚其城，不毁其业，使旧敌化为藩属，使土地重新归入主世界的光。复仇派则指着边境村庄的白骨说，血债只能血偿，火焰必须烧到敌人记住疼痛，焦土才不会再长出叛乱之花。两边都自称为了帝国，两边都能从战争中找到证据。真正悬在空中的，不只是仆从国的生死，也是帝国醒来之后要成为怎样的帝国：是以雨露收服天下，还是以雷霆震慑四方？天恩浩荡，不容置疑；可史官会记下每一道恩典，也会记下每一道雷霆。陛下，落笔吧。此后地图上的颜色、人口册上的空白、附庸旗帜下的沉默，都会证明帝国这一念究竟通向何处。\n\n这一段是帝国悲剧的骨节。表面上，它写的是觉醒、裁决、摄政与秩序重建；更深处，它写的是强人、战争和制度之间无法解开的结。Notch在时，帝国可以把分裂的力量聚成一拳；Notch不在，拳头里的每一根手指都会记起自己的方向。胜利没有终结矛盾，只是让矛盾披上凯旋的外衣继续发酵。史官不敢在当时直言盛极而衰，只能把伏笔藏在钟声、印玺和沉默里，等后人自己读懂。"
   HJM.34.a: "施舍雨露。"
   HJM.34.b: "投射雷霆。"

   HJM.35.t: "结束了？"
   HJM.35.d: "最后一座下界堡垒降下旗帜时，传送门两侧都没有立刻爆发欢呼。士兵们先是确认火光不会再从黑曜石门框里涌出，确认烈焰人的尖啸已经远去，确认那些曾把主世界村庄当作猎场的军团真的失去了统帅。随后，钟声才从后方传来，迟缓、沉重，像一只终于敢松开的拳头。帝国赢了。下界军团被击溃，Herobrine 的爪牙被拔除，仆从国或跪伏于帝国案前，或在雷霆中化为灰烬。可胜利的消息传回国都时，负责抄录捷报的书记官却在纸面上停了笔。他听见归来的军列里有伤兵低声咳血，听见军需署连夜计算抚恤与粮草，听见附庸使节在宫门外请求新的边境裁定，也听见人皇寝宫中越来越稀薄的呼吸。战争的烈火曾把帝国烧成一整块铁，如今火势退去，铁上的裂纹便重新显出。百姓在广场上问，结束了吗？将领说敌人已经败了；总督说账还没有平；穿越者说秩序需要重写；旧臣则望向宫门，谁也不敢说出那个更可怕的问题。帝国的胜利是真实的，尸山血海也是真实的。只是这场战争像一场盛大的鼓点，遮住了许多本该早已听见的松动声。如今鼓声停下，天下终于能听见，古老王冠内部还有什么在轻轻开裂。\n\n这一刻并非凯旋叙事的终点，而是战后叙事的开门。睡狮已经证明自己仍能撕碎敌人，可没有人能证明它醒来之后还能安稳地活下去。军旗穿过传送门，带回胜利，也带回债务、仇恨、地方离心、穿越者权柄与人皇衰老。史官因此把这一页写得格外克制：他们不敢否认帝国胜利，也不敢宣称一切太平，只在标题旁留下一个问号，留给后来人自己判断。"
   HJM.35.a: "先把军旗收回来。"

   HJM.36.t: "各地情况汇总"
   HJM.36.d: "摄政政府成立后的第一道命令，不是加冕，不是庆功，也不是追封，而是要求各地在七日内上呈战后奏报。红石信号从国都发出，像一张冰冷的网铺向主世界、下界、边境村庄、末地门户与新近臣服的藩属。奏报陆续抵达时，议事厅第一次真正看见胜利后的帝国究竟长成什么样子：有些村庄只剩半座钟楼，农田被尸潮踩成黑泥；有些军区仍在追剿残余魔族，士兵不愿解除战时戒备；有些总督借重建之名扩编卫队，奏章里全是忠诚，账册里却藏着自己的兵粮；有些藩属在旗帜下俯首，暗地里等待帝国疲惫；末地北境的紫光仍不安稳，下界堡垒的黑石还没有冷却，穿越者工坊则把战时特权写成常设条款，送到摄政王案前请求确认。菲尔·斯宾塞把一份份奏报摊开，旧臣们看见的是祖制受辱，军官们看见的是防线漏洞，穿越者看见的是可以接管的系统，村民代表看见的是再也等不起的抚恤名单。各地情况汇总本应是一份行政文书，却变成了摄政时代的第一张真实地图。地图上没有诗意，只有缺粮、失地、忠诚、怨气、军权、债务与仍未熄灭的火。\n\n人皇在世时，帝国可以把这些矛盾暂时合并为战争二字；人皇既崩，战争也已结束，每一条矛盾都必须重新拥有自己的名字。摄政政府试图用表格、印玺、军令和预算把天下重新钉住，可钉子越多，越能说明木板正在翘起。今日的汇总让帝国获得短暂清醒，也让所有掌权者明白，胜利之后并没有一条自然通往安宁的道路。若要继续统治，就必须选择先救哪里、先压哪里、先相信谁，又先牺牲谁。"
   HJM.36.a: "把账册合上，再把地图摊开。"

   # ==================== 普通剧情事件 ====================
   HJM.37.t: "粮车到站"
   HJM.37.d: "第一批开往边境村庄的粮车在清晨抵达旧站台。车厢不多，木板也没有重新刷漆，轮轴上还带着从前线带回来的黑灰。押运官翻开账册，里面写着麦捆、木材、铁锭、绷带和阵亡者家属名册。村民们没有像凯旋新闻里那样欢呼，只是排队、签名、按手印，偶尔抬头看一眼站台尽头的帝国旗。一个老铁匠问，下一批什么时候来；书记官没有回答，只说摄政政府正在核算。这样的小事不会登上世界新闻，也不会被史官写成大捷，可它比任何宣言都更能说明战后帝国的处境：胜利已经传遍天下，粮车却仍然一辆一辆地算。若马上放粮，边境会记住摄政政府没有忘记他们；若先把物资留在中央，账册会好看一些，村庄却会把沉默记得更久。"
   HJM.37.a: "先救村庄。"
   HJM.37.b: "先核账，再发粮。"

   HJM.38.t: "穿越者工坊申请"
   HJM.38.d: "穿越者工坊递上了一份很厚的申请。第一页写着战后重建，第二页写着红石通信，第三页开始便全是旧臣看不懂的图表、流程、配方和权限请求。工坊代表说，他们可以把战时经验转成生产规程，可以帮帝国修路、建厂、改造传送门哨卡；但他们需要更自由的试验权，需要从军需署、矿务厅和地方工坊调人调料。旧臣听见自由二字便皱眉，军官听见效率二字便沉默，菲尔·斯宾塞则把申请翻到最后一页，看见那里只写了一句话：不要让胜利后的帝国重新变慢。这不是震动天下的大事，只是一份章程、一枚印章和几间工坊的归属；可许多更大的变化，往往就是从这种不起眼的申请开始。"
   HJM.38.a: "准许有限章程。"
   HJM.38.b: "先压着，逐项复核。"

   HJM.39.t: "贡赋延期"
   HJM.39.d: "新藩属的贡赋表没有按时送齐。总督府解释说，道路尚未修复，仓库清点未完，旧军队缴械也比预想更慢。监察使却在密折里写得更直白：他们在拖。不是公开反叛，也不是撕毁誓约，而是用缺少车马、缺少书记、缺少印章这类理由，把帝国命令一点点磨慢。摄政议事厅对此并不意外。刚刚跪下的土地不会立刻学会顺从，刚刚插上的旗帜也不会立刻长出忠诚。问题只在于，帝国要用账册教它们服从，还是用军靴教它们服从。前一种办法慢，后一种办法响；前一种办法让地方暂时喘气，后一种办法让所有人立刻明白王命仍有重量。"
   HJM.39.a: "准许延期，誓约加押。"
   HJM.39.b: "派监察使和军队去。"

   HJM.40.t: "旧王冠的座次"
   HJM.40.d: "摄政议事厅为追悼仪制开了一场小会。议题听起来微不足道：旧王冠应摆在长案中央，还是摆在摄政王座侧后；Jeb 的名号应写在公告第二行，还是第四行；穿越者代表入厅时是否需要向王冠行礼。可会议只开了半个时辰，书记官便明白这不是礼仪问题。旧臣想借座次证明法统仍在，摄政班底想借座次证明行政已经换手，军官只希望命令不要因为这些争执迟到。帝国刚刚赢得战争，却要在一顶无人佩戴的王冠前重新学习如何坐下。这样的事很普通，普通到不会有新闻官愿意写；也正因如此，它才像灰尘一样落进每一本战后账册。帝国的裂缝并不总在炮火里，有时也在一张椅子和另一张椅子之间。"
   HJM.40.a: "给旧臣一个体面座次。"
   HJM.40.b: "摄政政府按新规办事。"
   HJM_traveler_workshop_bonus: "穿越者工坊章程"
   HJM_magma_workshop_audit: "玄武岩工坊清册"

   # ==================== 仆从国处置反应事件 ====================
   HJM.41.t: "焚天余烬"
   HJM.41.d: "焚天计划的新闻传遍天下之后，最先送回国都的不是颂词，而是一叠被烟熏黑的现场清册。监察使说，林地府邸旧土已经没有可供点验的城镇，只有被炸开的山脊、塌陷的矿道和一条条被红石火线烙进土地里的伤痕。军官们在地图上用黑墨划掉旧国名，动作干净得像完成一道算术；可书记官在登记移交给洞穴行政的地块时，却不得不把许多栏位留空：人口无从核定，仓储无从接收，道路无从修复，甚至连边界都因爆破而改变。朝堂上，复仇派称这是天威，称天下藩属从此不敢再为 Herobrine 开门；温和派没有公开反驳，只问一句，若被处置之地已经没有村庄、没有税册、没有工坊，那么帝国究竟收回了土地，还是只收回了一片会永远消耗军粮的灰烬。边境村民听见消息时有人痛快，有人沉默。痛快者记得被劫掠的粮仓，沉默者则想到帝国的雷霆既能落在敌人头上，也能把旁观者的心震裂。洞穴总督派来的接收队在灰烬旁竖起新界碑，界碑上刻着帝国年号，可风吹过时，黑灰仍会落进字缝。更棘手的是，接收队发现幸存的道路需要帝国出钱重铺，迁来的守军需要帝国供粮，连所谓奖给臣服者的土地也必须由帝国派人看守。于是这场惩戒在账面上变成了新的边防预算，也变成摄政政府必须解释的第一笔黑色开支。史官后来写道，焚天余烬没有立刻反叛，也没有立刻平定；它只是在帝国版图上留下一块安静的黑斑，提醒所有人，恐惧可以制造服从，却不会自动制造秩序。"
   HJM.41.a: "把灰烬也登记入册。"

   HJM.42.t: "北境空册"
   HJM.42.d: "凋零风暴被抹去后，末地北境送来的第一份奏报薄得异乎寻常。纸面上没有太多胜利辞令，只有堡垒编号、传送门坐标、缴获清单和一大片空白的人口栏。末影王庭的使节在国都阶下谢恩，感谢帝国替他们拔除叛逆；可他谢恩时声音很轻，像是怕让身后的空白听见。军务厅则对此十分满意，认为北境叛军曾在大战中背刺王庭、威胁帝国侧翼，如今被交给臣服者治理，正是对天下最清楚的告诫：依附帝国者可得土地，背弃帝国者无处容身。可是边防将领的私信并不轻松。他们说，末地荒原上的紫光比从前更冷，旧部落虽然被解散，亲族与密誓却不会随着旗帜一同燃尽；王庭拿到了土地，也拿到了一片需要长期驻军、长期供粮、长期解释合法性的荒凉边境。更让人不安的是，王庭使节开始频繁请求帝国派出顾问，口口声声说是协助治理，实际却像在把一片没人愿意接手的空地重新推回宗主怀里。北境残部没有旗帜，却仍可能藏在传送门后的阴影里，等待帝国与王庭为税粮、驻军和继承权争吵。摄政政府把这份奏报压在案角，命人重新核定北境防务。人皇在时，一道圣旨足以让藩属相信恩威出自同一只手；如今手已经换了，恩威仍在，信任却少了一截。北境空册因此成了战后最不祥的文书之一：它证明帝国赢得了惩戒，也证明惩戒之后，纸上的空白会比敌军更久地留在那里。"
   HJM.42.a: "空白也要盖上帝国印。"

   HJM.43.t: "洞穴旧旗入库"
   HJM.43.d: "洞穴聚落归附后，总督府没有立刻焚毁旧旗，而是命人将它们折叠、编号、封存，送入新设的档案库。这个决定在前线引发了小小争论。经历过村庄被掠夺的士兵认为旧旗应当公开烧掉，让所有背叛者看见下场；接收官却说，若连旗帜都不许保存，地方官吏便会觉得帝国只想羞辱他们，而不是统治他们。于是旧旗被放进木箱，木箱外贴上帝国封条，封条旁边又立起新旗。洞穴贵族在宣誓时跪得很整齐，工坊主交出的账册也比预想完整，矿道守卫开始接受帝国编号。表面上，一切都像温和派想象的那样运转：不毁其城，不断其业，让旧敌在帝国法度下重新学会呼吸。可监察使的笔没有因此停下。他们发现许多地方把最好的铁料藏进私人矿洞，把年轻工匠登记成伤病，把与 Herobrine 往来的旧信拆成碎片混进炉灰。地方村民也在试探新秩序：有人主动送来矿道图，有人把帝国公告贴在门口，却夜里仍给旧官署递话；有人称王师仁德，也有人只是在计算下一次征粮会不会变轻。宽恕不是结束，而是一场更细的战争。菲尔·斯宾塞看完奏报后批了四个字：以册束之。意思很清楚，洞穴旧旗可以入库，洞穴旧人也可以活下去，但他们的姓名、矿脉、税粮、工坊和沉默，都必须一格一格写进帝国表册。温和的雨露落下了，雨水下面仍有铁钉。"
   HJM.43.a: "让他们在账册里归顺。"

   HJM.44.t: "金库誓约"
   HJM.44.d: "猪灵堡垒打开城门后，帝国使团留在金库前监督第一批贡赋交割。金锭被一箱箱搬上矿车，车轮压过黑石地面，声音清脆得让人误以为战争已经变成买卖。猪灵长老在火把下宣誓，承认帝国宗主权，承认总督有权查验军火与传送门，承认堡垒未来不得再向 Herobrine 旧部出售兵器。誓词写得庄重，可每个人都知道，真正让城门打开的并不是墨水，而是黄金。朝堂温和派把这称为不战而屈人之兵，商贾则开始盘算下界贸易重新开通后的利润；复仇派对此嗤之以鼻，认为用黄金买来的臣服也可能被更重的黄金买走。前线军官的报告更现实：堡垒尚在，工匠尚在，仓库尚在，这比攻城后的废墟有用得多；但猪灵看帝国旗帜的眼神不像看君主，更像看一份价格暂时合适的契约。更有商队私下议论，帝国既然愿意用金锭买今日的城门，明日是否还得用更多金锭买沉默、买道路、买税期准时。摄政政府听见这些话后没有否认，只命令贡赋、军火、金库钥匙与族长继承顺位一并登记，并派会计官常驻金库，连熔炉余料也要折算成贡额。金库誓约不是温情故事，它是一套沉甸甸的锁链。黄金打开了城门，也把帝国和猪灵绑在同一个账本里。账本今日能写忠诚，明日也可能写违约；所以帝国必须让每一枚金锭都记得，自己从此先属于王命，再属于堡垒。"
   HJM.44.a: "金锭也要听王命。"

   HJM.45.t: "熔炉登记"
   HJM.45.d: "玄武岩城邦臣服后，最忙的不是外交官，而是被派去清点熔炉的书记官。城邦代表交出了图纸、矿料配方和部分工匠名册，却在许多关键页上写得含糊：某些红石回路被称作地方惯例，某些黑石合金被说成祭炉秘法，某些工程师则在帝国军队进城前忽然生病。穿越者工坊对此很感兴趣，军需署也很感兴趣，旧臣却本能地警惕这座仍在岩浆海上发热的城市。温和派坚持保留城邦结构，因为一座完整的工坊胜过一片漂亮的废墟；复仇派则冷笑说，火若不先被踩灭，迟早会反烧主人。摄政政府最终选择登记而非摧毁：每一座熔炉编号，每一名工程师造册，每一条传送门线路加派帝国监工。随后争论又落到更现实的细处：工匠工资由谁支付，危险试验由谁担责，若城邦技术被穿越者改造，功劳该算帝国、总督还是那些仍不完全可信的旧工程师。城邦居民没有欢呼，也没有公开反抗。他们只是照常给炉膛添煤，在铁水亮起时短暂看向门口的帝国士兵。那一刻，士兵忽然明白所谓臣服并不等于驯服。摄政王案前因此多了一份特殊清册，清册既是战利品，也是人质名单。火焰换了主人，可火焰仍然是火焰，仍会寻找缝隙、空气和可燃之物。熔炉登记为帝国带来了技术，也带来了新的依赖：若要使用这团火，就必须日日看守它，不能让它熄灭，也不能让它烧穿笼壁。"
   HJM.45.a: "把炉火纳入帝国清册。"

   HJM.46.t: "灰烬里的户籍"
   HJM.46.d: "烬化政策结束后，洞穴旧土的户籍重编比战争本身更慢。总督府派出的书记官坐在临时木棚里，面前排着幸存者、俘虏、迁徙工匠和被强令留下修路的地方官。许多人没有完整姓名，许多人没有可证明身份的亲族，更多人只是沉默地按下手印，仿佛只要不说话，便能从帝国眼中消失。复仇派认为这正是政策成功的证明：城毁了，厂拆了，旧军队散了，剩下的人只能在帝国表册里重新获得存在。可基层官吏知道，灰烬不会因为盖章而变成粮仓。没有工厂就没有税，没有道路就没有运输，没有体面就没有真正顺从。边境村民对这片焦土并不同情，他们记得洞穴军队曾怎样带路，记得魔族怎样顺着矿道涌来；但当第一批苦役队被押往重建工地时，连他们也开始意识到，仇恨能够解释毁灭，却不能替帝国修好每一块石砖。更麻烦的是，惩戒政策还在帝国内部制造出新的派系语言：有人把所有预算削减都说成继续复仇，有人把所有安抚措施都骂成替叛徒求情，连普通赈济也开始被迫表态。摄政政府收到报告后没有撤回政策，只追加了监察与配给，并要求地方每月上报逃亡人数。灰烬里的户籍由此成为雷霆路线的第一份日常账单：它证明帝国可以摧毁不忠，也证明摧毁之后仍要统治活人。王命落下时很响，落下之后，账册翻页的声音更长。"
   HJM.46.a: "在灰烬里重新点名。"

   HJM.47.t: "城门下的宣誓"
   HJM.47.d: "猪灵自治区成立那天，宣誓台就搭在旧城门下。石缝里的血迹还没有洗净，帝国军靴踩过时会留下深浅不一的红印。新任总督要求猪灵首领逐一上前，向帝国旗帜、军需封条和缴械清单宣誓。没有黄金车队，没有商谈酒宴，也没有体面的让步；只有被拆掉炮闩的军工厂、被查封的金库和站在高处冷眼旁观的帝国士兵。复仇派对这种场面十分满意，认为猪灵终于学会了比黄金更硬的道理。军官们也把攻城经验写进教材，称堡垒式目标必须先切断金库与军火，再逼迫地方首领在众目睽睽下承认失败。可是财政官的奏报没有那么痛快。城门血海毁掉的不只是抵抗意志，也毁掉了许多本可立即纳入帝国体系的工匠、仓储与贸易线路。猪灵商队开始绕路，幸存贵族在酒窖里低声数着死者名字，堡垒孩子看见帝国旗时先学会的不是敬畏，而是闭嘴。帝国军纪官还报告说，一些前线部队把这场胜利当成无限度掠夺的许可证，若不及早收束，复仇就会从国策变成习惯，并反过来吞掉军令本身，甚至影响后续藩属治理，让军法也变得难看。宣誓完成后，总督把誓书送回国都，纸上字迹工整，印章鲜红。菲尔·斯宾塞看完后只问，下一季贡赋能否按时到达。没人立刻回答。因为城门下的宣誓确实让猪灵跪下了，却没有让它们忘记自己是怎样跪下的。"
   HJM.47.a: "让誓词压住血迹。"

   HJM.48.t: "黑石冷却之后"
   HJM.48.d: "玄武岩城邦沉入岩浆之后，冷却的黑石像一片凝固的海。帝国工程兵在废墟边缘搭起栈道，用长钩从裂缝中拖出扭曲的熔炉外壳、烧坏的图纸箱和已经认不出主人的工具。复仇派说，这样最好，魔族工坊从此不能再为敌人铸剑；军需署却在清单旁写下损失，语气冷得像另一种控诉：若这些工坊完整保留，帝国本可以更快修复传送门炮台，更快重建下界前进基地，更快把敌人的火变成自己的火。幸存的玄武岩工匠被集中登记，他们看着旧城方向，脸上没有反抗，只有一种被烧空后的迟钝。总督宣布自治区仍将成立，帝国会在废墟上重造听命的行政区；可是所有人都明白，新区第一件要做的事不是生产，而是清理瓦砾。前线士兵喜欢这个结果，因为它像一场彻底胜利；后方规划官却开始为缺少工匠、缺少炉基、缺少道路而争吵。更有穿越者代表指出，毁灭旧工坊虽然消除了技术泄密的风险，却也让帝国不得不从零开始学习本可直接接管的下界工艺；这不是不能承受的代价，却是必须有人承认的代价，也会拖慢下界驻防的重建。黑石冷却之后，帝国终于能清楚看见自己亲手留下的形状：一片不再危险、也暂时不再有用的土地。雷霆确实消灭了隐患，可雷霆过后，仍要有人拿着铲子走进余温里，把帝国需要的秩序一点点挖出来。"
   HJM.48.a: "余温未尽，先立界碑。"

   HJM.49.t: "阴影未熄"
   HJM.49.d: "HIM 投降后的第五日，摄政政府收到了第一批下界遗患奏报。捷报上的字还没有干，另一叠纸便被放到长案中央：边境矿道里发现没有旗帜的僵尸小队，废弃传送门在夜里自行亮起，几个村庄的孩子又听见唱片从井口传来，俘虏营里的烈焰人工匠则用彼此听不懂的暗号交换消息。军务厅说这只是战败势力的残喘，派几支巡逻队便能处理；档案官却指出，Herobrine 从来不只是一个统帅，他更像一套能让恐惧反复复活的符号。旗帜倒下了，符号仍会藏在唱片、传言、俘虏口供、黑曜石门框和边境孩子的噩梦里。摄政政府不能公开承认胜利仍有缺口，因为天下刚刚听见凯旋新闻；可它也不能假装缺口不存在，因为所有奏报都在指向同一件事：魔族战败后留下的不是一座可以立刻拆除的营地，而是一片渗进土里的阴影。菲尔·斯宾塞命人设立临时案卷，把残党、传送门污染、异常唱片和俘虏审讯分门别类。旧臣认为这会冲淡凯旋气氛，军官认为这会拖慢复员，村庄代表则只问一句，若夜里又听见那段音乐，谁来敲门，谁来守夜。于是帝国在胜利之后又开了一间小小的办公室。门楣上没有荣耀，只有封条、火把和厚得令人心烦的清单。战争结束了，但战败者留下的东西，还要由胜利者一件一件收拾。"
   HJM.49.a: "把阴影也写进案卷。"

   # ==================== 猖獗度系统事件 ====================
   HJM.illager_tick.a: "（系统）"

   HJM.illager_purge.t: "严厉打击灾厄村民"
   HJM.illager_purge.d: "战争已经爆发，帝国再无余力容忍腹背受敌。过去，朝堂中总有人主张对灾厄村民留一线余地：他们熟悉林地，懂得边境，若能归化，未必不能为帝国所用。可密信已经截获，哨塔已经失联，村庄坐标已经出现在敌人的信号里。仁慈若不能换来忠诚，就只会变成递给敌人的钥匙。军务厅下令封锁林地府邸，地方驻军清查灰皮人据点，所有传令哨、暗仓、伪装商队和地下通道都被列入清剿名单。村民们看见火把在夜里连成长龙，听见铁门被撞开，听见旧日归化部落的首领被押上广场宣读罪状。有人说斩草除根太过严酷，有人说帝国终于醒悟。可前线正在流血，儿郎们不能一边抵挡Herobrine，一边担心背后村庄被内线点燃。猖獗度系统将停止运作，这不是行政调整，而是战时裁决：凡仍愿为帝国效力者，交出密信与武器；凡仍替黑暗开门者，便与魔族同罪。斩草除根，不为泄愤，只为让帝国能把全部锋芒投向外敌。\n\n侦察链的意义正在于此：它没有立刻带来胜利，却让帝国学会承认危险的形状。一个衰老的国家最可怕的病，不是敌人强大，而是看见敌人时仍愿自欺。第七哨塔、灰烬脚印、午夜密语，这些零碎线索像钉子一样钉进帝国案头，逼迫朝堂承认边境已经不是边境，传说已经不是传说。儿郎们后来的冲锋，正是从这些看似细小的证据里获得理由：我们不是为了幻影而战，我们是在为每一座被标记的村庄先发制人。"
   HJM.illager_purge.a: "斩草除根。"

   # ==================== 新闻事件 ====================
   HJM_news.1.t: "MC帝国发布魔族战争咨文"
   HJM_news.1.d: "MC帝国今日发布魔族战争咨文，檄文自武汉行在发出，经红石信号与驿骑传遍主世界诸村。文中称，自十一号唱片与十三号唱片的恐怖传言重现以来，边境村庄屡遭袭扰，灾厄村民暗线频繁活动，下界魔族在 Herobrine 旗帜下重新集结，主世界秩序已至存亡之秋。帝国不再把此事称作边境骚乱，也不再以盗匪、野怪、旧怨等词粉饰战火；咨文明言，这是一场保卫村庄、矿道、麦田与中原尊严的战争。各地村庄被要求清点粮草，修整钟楼，组织义勇；铁匠铺、红石工坊与军需署同步转入战时状态。外界观察者注意到，帝国在咨文中没有许诺轻松胜利，反而反复提到枕戈待战、扫平黑暗、绝不姑息等字句。垂垂老矣的古老帝国似乎终于承认，风暴已经不是远处雷声，而是叩在城门上的铁拳。新的战争已经开始。无论帝国是否已经准备好，天下都将看见它如何回答Herobrine的归来。\n\n这则消息传遍各国时，真正震动天下的并非单一事件本身，而是它被放进同一条帝国叙事之后显出的方向：一个衰败古国正在战争中重新聚合，用檄文唤醒臣民，用铁与红石重铸军队，也把未来的恩典、雷霆、债务与裂缝一并推到台前。每一则新闻都是一块砖，垒起睡狮苏醒的丰碑；每一块砖下也压着阴影，提醒后来者，帝国的强光越盛，未决之事也越多。天下今日读到的是捷报、惊变或裁决，史书明日读到的，却可能是崩盘之前的序章。"
   HJM_news.1.a: "新的战争已经开始。"

   HJM_news.2.t: "MC帝国对魔族宣战"
   HJM_news.2.d: "十一号唱片的倒计时终于归零。那段破碎、低沉、像从旧时代坟墓中传出的旋律，在无数村庄的夜色里被人反复谈起；今日，它不再只是恐怖传说，而成为战争爆发的钟声。MC帝国正式向魔族宣战，帝国军队越过边境，旗帜沿着山道、河谷与废弃传送门向前推进。战报显示，魔族并非零散怪物，而是由僵尸、骷髅、烈焰人、灾厄暗线与下界军团组成的庞大体系。Herobrine 的名字被帝国公告直接写出，这意味着那个曾被抹去、被沉默、被改写成怪谈的旧影，已经重新回到天下政治的中心。主世界各国对此反应不一，有人担心帝国唤醒了更大的灾祸，有人期待古老强权再次展现雷霆。可对边境村民而言，争论并不重要。尸潮已经到过他们门前，钟楼已经敲过警报，孩子已经躲进地窖。战争开始了。帝国没有再退，也不能再退。此战所决，不只是两国胜负，而是主世界是否仍由生者守望。\n\n这则消息传遍各国时，真正震动天下的并非单一事件本身，而是它被放进同一条帝国叙事之后显出的方向：一个衰败古国正在战争中重新聚合，用檄文唤醒臣民，用铁与红石重铸军队，也把未来的恩典、雷霆、债务与裂缝一并推到台前。每一则新闻都是一块砖，垒起睡狮苏醒的丰碑；每一块砖下也压着阴影，提醒后来者，帝国的强光越盛，未决之事也越多。天下今日读到的是捷报、惊变或裁决，史书明日读到的，却可能是崩盘之前的序章。"
   HJM_news.2.a: "战争开始了。"

   HJM_news.3.t: "魔族覆灭——帝国全面胜利"
   HJM_news.3.d: "魔族最后的抵抗已经瓦解。随着下界要塞降下旧旗，Herobrine 体系中最顽固的巢穴、堡垒与附庸相继失去组织，MC帝国宣布取得全面胜利。曾经从黑暗中涌向主世界的尸潮，如今被驱回焦土；曾经以恶魂之泪标记帝国村庄的作战室，如今挂上帝国军旗；曾经为Herobrine开门的仆从国，或俯首称臣，或等待审判。主世界各地钟楼同时鸣响，村庄广场上有人拥抱痛哭，有人把阵亡者名单贴到墙上，有人只是望着远处，像还不敢相信漫长黑夜已经过去。帝国宣传机构称此役为天下藩服、天下归心，称睡狮苏醒之后的反攻证明帝国仍是主世界唯一的太阳。可史官在胜利公报边缘写下更冷的注脚：战争能把一个衰老帝国重新锻成利剑，却未必能让它重新年轻。此刻没人愿意听这样的警告。凯旋的号声太响，鲜花太盛，烈火烹油般的荣光盖过一切裂纹。战争终于画上句号，但胜利之后的帝国，将比战争本身更难统治。\n\n这则消息传遍各国时，真正震动天下的并非单一事件本身，而是它被放进同一条帝国叙事之后显出的方向：一个衰败古国正在战争中重新聚合，用檄文唤醒臣民，用铁与红石重铸军队，也把未来的恩典、雷霆、债务与裂缝一并推到台前。每一则新闻都是一块砖，垒起睡狮苏醒的丰碑；每一块砖下也压着阴影，提醒后来者，帝国的强光越盛，未决之事也越多。天下今日读到的是捷报、惊变或裁决，史书明日读到的，却可能是崩盘之前的序章。"
   HJM_news.3.a: "天下藩服,天下归心。"

   HJM_news.4.t: "11号唱片重现人间"
   HJM_news.4.d: "深夜的旷野里，那段诡异旋律再度响起。边陲村民从噩梦中惊醒，捂住孩子的耳朵，却捂不住穿透窗棂的音符。十一号唱片重现人间，像一只从旧史灰烬里伸出的手，把主世界拖回那个不愿被提起的年代。老人们说，这是祖辈吓人故事里的东西；史官却知道，故事之所以能吓人，是因为它曾经真实。上一次唱片响起，主世界几乎被黑暗吞没，Herobrine 的名字从宫廷记录中被删去，从村庄传说中被扭曲，从人皇口中被封存。如今它又回来了。有人说在晨雾里看见白眼身影，有人说废矿道深处响起不属于这个世界的笑声；更坏的消息则来自帝国斥候：灾厄村民的林地府邸重燃烽火，那些灰色皮肤的归化异族不再传递帝国密信，而是在替另一个主人标记村庄与哨塔。朝堂之上，老臣们面面相觑。他们记忆中的噩梦似乎正在重来，而这一代帝国儿郎甚至还没学会如何称呼它。古老的恐怖正在归来，唱片不是音乐，是战书。\n\n这则消息传遍各国时，真正震动天下的并非单一事件本身，而是它被放进同一条帝国叙事之后显出的方向：一个衰败古国正在战争中重新聚合，用檄文唤醒臣民，用铁与红石重铸军队，也把未来的恩典、雷霆、债务与裂缝一并推到台前。每一则新闻都是一块砖，垒起睡狮苏醒的丰碑；每一块砖下也压着阴影，提醒后来者，帝国的强光越盛，未决之事也越多。天下今日读到的是捷报、惊变或裁决，史书明日读到的，却可能是崩盘之前的序章。"
   HJM_news.4.a: "古老的恐怖，正在归来。"

   HJM_news.5.t: "MC帝国与穿越者缔结协约"
   HJM_news.5.d: "一群自称穿越者的异乡人出现在帝国都城之外。没有人知道他们从何而来，他们自己说来自另一个世界；没有人知道他们是否会真正死亡，因为有人亲眼看见他们从战场废墟中重新站起；没有人知道他们是否敬畏帝国，因为他们看宫墙、工坊与军队的眼神，不像臣民仰望君主，而像工匠审视一套等待改造的机器。今日，MC帝国与穿越者正式缔结协约。签署现场，紫色光晕在铠甲与卷轴之间闪烁，照得满朝文武睁不开眼。协约规定，穿越者将以经验、奇术、战法和方外知识协助帝国扫平魔族；作为交换，他们将在帝国军队、工坊与部分行政体系中享有特殊权力。支持者欢呼帝国又得一柄利剑，反对者则低声说，引入规则之外的人，未必只会改变战场。周边诸国侧目而视，既羡慕这股力量，又恐惧它会把一个垂老帝国重新推上巅峰。没有人能说清穿越者究竟是救火之雨，还是燎原之风。只有一点已经确定：从今日起，帝国的剑又多了一柄；而这柄剑，锋利得连握剑之人也必须小心。\n\n这则消息传遍各国时，真正震动天下的并非单一事件本身，而是它被放进同一条帝国叙事之后显出的方向：一个衰败古国正在战争中重新聚合，用檄文唤醒臣民，用铁与红石重铸军队，也把未来的恩典、雷霆、债务与裂缝一并推到台前。每一则新闻都是一块砖，垒起睡狮苏醒的丰碑；每一块砖下也压着阴影，提醒后来者，帝国的强光越盛，未决之事也越多。天下今日读到的是捷报、惊变或裁决，史书明日读到的，却可能是崩盘之前的序章。"
   HJM_news.5.a: "帝国的剑，又多了一柄。"

   HJM_news.6.t: "丧师失地，帝国惊觉——睡狮苏醒"
   HJM_news.6.d: "在丢掉大片国土、连吃败仗、几乎被魔族兵临城下之后，被天下讥为垂垂老矣的MC帝国，忽然爆发出惊人的战争意志。消息最初来自前线：一支原本准备后撤的部队停止撤退，重新修整阵线；随后是第二支、第三支。逃散的辎重队掉头回营，失联的村庄重新敲响钟楼，伤兵把绷带系紧，要求返回岗位。所有变化都指向一道《人皇口谕》。没有人知道口谕原文究竟写了什么，只有传令兵说，人皇 Notch 亲临泥泞广场，向村民和士兵承认帝国的失败，也命令帝国从失败中站起。观察者惊呼：睡狮苏醒了。曾经沉湎承平旧梦的庞然古国，在尸潮、焦土与丧师失地中被硬生生唤醒，开始转入全面反攻。有人翻出旧史，说帝国当年也曾这般爆发，那一次它扫平半个大陆；也有细心史官皱眉，因为历史上每一次烈火烹油、鲜花着锦的盛景之后，往往都藏着盛极而衰的影子。但谁又在乎呢？至少此刻，儿郎们重新握剑，村庄重新亮灯，帝国醒了。\n\n这则消息传遍各国时，真正震动天下的并非单一事件本身，而是它被放进同一条帝国叙事之后显出的方向：一个衰败古国正在战争中重新聚合，用檄文唤醒臣民，用铁与红石重铸军队，也把未来的恩典、雷霆、债务与裂缝一并推到台前。每一则新闻都是一块砖，垒起睡狮苏醒的丰碑；每一块砖下也压着阴影，提醒后来者，帝国的强光越盛，未决之事也越多。天下今日读到的是捷报、惊变或裁决，史书明日读到的，却可能是崩盘之前的序章。"
   HJM_news.6.a: "帝国，醒了。"

   HJM_news.7.t: "焚天烈焰——一国在地图上被抹去"
   HJM_news.7.d: "MC帝国的焚天计划付诸实施。那是一个没有月亮的夜晚，林地府邸一脉的国土上，帝国工兵沿山脉、矿道与旧堡垒铺设数以万吨计的TNT，红石线路像血脉一样爬过焦黑土地。倒计时归零时，山岳被震碎，天穹被火光烧穿，整片国土在冲天烈焰中化为焦土。火光映红半个天空，浓烟遮蔽太阳，三日不散。一个曾在Herobrine麾下为虎作伥的主权，就这样从地图上被抹去。没有投降谈判，没有王室流亡，也没有体面的战败仪式；只有被翻起的土层、被焚毁的府邸、再也辨认不出形状的灰烬。国际社会为之哗然，外交官们公开谴责帝国野蛮，私下却不断追问：下一个会是谁？帝国宣传机构只回应八个字：雷霆所至，寸草不留。焚天计划证明，睡狮苏醒后的帝国不只会收复失地，也会把背叛者连同其根脉一并碳化。焦土之上，再无生者；焦土之外，天下终于明白，帝国的怒火已经不再是传闻。\n\n这则消息传遍各国时，真正震动天下的并非单一事件本身，而是它被放进同一条帝国叙事之后显出的方向：一个衰败古国正在战争中重新聚合，用檄文唤醒臣民，用铁与红石重铸军队，也把未来的恩典、雷霆、债务与裂缝一并推到台前。每一则新闻都是一块砖，垒起睡狮苏醒的丰碑；每一块砖下也压着阴影，提醒后来者，帝国的强光越盛，未决之事也越多。天下今日读到的是捷报、惊变或裁决，史书明日读到的，却可能是崩盘之前的序章。"
   HJM_news.7.a: "焦土之上，再无生者。"

   HJM_news.8.t: "末地北境分裂"
   HJM_news.8.d: "随着MC帝国与魔族战争全面爆发，末地旧有的沉默终于被打破。长期以来，末影王庭以遥远、孤高和沉默维系统治，仿佛传送门另一端的紫色荒原可以永远置身主世界与下界的纷争之外。可战争不会尊重沉默。末影王庭宣布效忠MC帝国，试图以臣服换取主世界庇护，也借帝国之名压住内部裂缝；北境诸部却拒绝承认这一决定。他们撕下旧旗，另立门户，自称凋零风暴，向帝国与王庭同时宣战。传送门另一侧，紫色光芒不再象征神秘，而象征边界崩裂。末影城的贵族说北境是叛逆，凋零风暴的首领则宣称王庭已向主世界卖掉末地尊严。于是战争从主世界与下界之间的旧仇，扩展成跨越维度的秩序战争。有人说这是Herobrine早已埋下的计划，有人说末地不过是在乱世中露出本就存在的裂缝。无论真相如何，传送门已经关不上了。帝国得到一个藩属，也得到一场新的边境战争。\n\n这则消息传遍各国时，真正震动天下的并非单一事件本身，而是它被放进同一条帝国叙事之后显出的方向：一个衰败古国正在战争中重新聚合，用檄文唤醒臣民，用铁与红石重铸军队，也把未来的恩典、雷霆、债务与裂缝一并推到台前。每一则新闻都是一块砖，垒起睡狮苏醒的丰碑；每一块砖下也压着阴影，提醒后来者，帝国的强光越盛，未决之事也越多。天下今日读到的是捷报、惊变或裁决，史书明日读到的，却可能是崩盘之前的序章。"
   HJM_news.8.a: "传送门已经关不上了。"

   HJM_news.9.t: "武汉会议召开"
   HJM_news.9.d: "魔族战争咨文发布后，MC帝国车驾移驻武汉。帝国重臣、边防将领、穿越者代表、红石工程师与地方总督齐聚行在，围绕同一个问题争执到深夜：这场战争究竟该由谁来打，又要打到哪一步。村民将领主张堂堂正正，以主世界儿郎组成集团大军，稳扎稳打压过边境；他们说，帝国的土地应由帝国骨血守卫，退一步就是家，进一步才是国。穿越者代表则提出地狱门奇袭构想，绕开正面防线，直插下界腹地，打断Herobrine的集结根基；他们说，敌人既然从门中来，帝国也能从门中去。争论激烈，却没有让帝国显得软弱，反而让所有人第一次看清，这不再是边境械斗，而是一场决定军队、制度、权柄与未来主人是谁的战争。会议最终形成战时章程：帝国既要自己的儿郎，也要方外的锋刃；既要集团攻势，也要奇兵暗度。剑已出鞘，谁来执柄？武汉会议没有回答全部问题，却把问题钉进了帝国未来。\n\n这则消息传遍各国时，真正震动天下的并非单一事件本身，而是它被放进同一条帝国叙事之后显出的方向：一个衰败古国正在战争中重新聚合，用檄文唤醒臣民，用铁与红石重铸军队，也把未来的恩典、雷霆、债务与裂缝一并推到台前。每一则新闻都是一块砖，垒起睡狮苏醒的丰碑；每一块砖下也压着阴影，提醒后来者，帝国的强光越盛，未决之事也越多。天下今日读到的是捷报、惊变或裁决，史书明日读到的，却可能是崩盘之前的序章。"
   HJM_news.9.a: "剑已出鞘，谁来执柄？"

   HJM_news.10.t: "北境无赦"
   HJM_news.10.d: "MC帝国宣布对凋零风暴执行绝不姑息政策。雅库茨克陷落后，帝国军队拒绝接受成建制投降。末地北境的旧旗帜被连夜焚毁，堡垒、哨站、传送门节点和军用仓库被逐一清算；凋零风暴所控制的土地被划归末影王庭，作为对其臣服帝国的回报，也作为对北境叛逆的惩戒。帝国公告称，凋零风暴在主世界与下界大战最危急之时背刺王庭、威胁帝国侧翼，若不以雷霆处置，天下附庸皆会心存侥幸。反对者则称，这是一场披着胜利外衣的灭国，是用秩序之名将北境从政治地图上抹去。可在前线，没有人争论措辞。士兵们只看见北境烽烟一座接一座熄灭，看见传送门旁的紫光被帝国军旗遮住。凋零风暴曾想在乱世里攫取自己的王冠，如今只留下一个警告：帝国可以庇护臣服者，也可以让背叛者没有第二次机会。对变节者，帝国绝不姑息。\n\n这则消息传遍各国时，真正震动天下的并非单一事件本身，而是它被放进同一条帝国叙事之后显出的方向：一个衰败古国正在战争中重新聚合，用檄文唤醒臣民，用铁与红石重铸军队，也把未来的恩典、雷霆、债务与裂缝一并推到台前。每一则新闻都是一块砖，垒起睡狮苏醒的丰碑；每一块砖下也压着阴影，提醒后来者，帝国的强光越盛，未决之事也越多。天下今日读到的是捷报、惊变或裁决，史书明日读到的，却可能是崩盘之前的序章。"
   HJM_news.10.a: "对变节者，帝国绝不姑息。"

   HJM_news.11.t: "故土新归"
   HJM_news.11.d: "洞穴聚落向MC帝国俯首称臣。帝国军队进入曼谷后，没有选择焚城，也没有将所有旧有结构一并打碎。相反，帝国宣布设立世界边境特别行政区，任命总督接管行政，保留部分地方官署与生产体系。旧日敌人被要求缴械、登记、宣誓，交出与Herobrine往来的密信和军用仓库；但他们仍被允许以帝国藩属身份继续存在。帝国宣传机构将此称为故土新归：迷途者仍可归乡，失序之地仍可重编为王道边疆。支持者赞叹王师气度，说不焚其城，不毁其业，正是帝国足以统御天下的仁德；怀疑者则提醒，所谓归乡并非自由，而是从一纸总督令开始的新秩序。洞穴聚落的城墙上升起帝国旗帜，旧旗没有被焚毁，而是被折叠入库，像一段被允许保存却不再允许发声的历史。王师所至，箪食壶浆。可箪食壶浆之后，土地、税粮、军队与未来，都将归入帝国册籍。\n\n这则消息传遍各国时，真正震动天下的并非单一事件本身，而是它被放进同一条帝国叙事之后显出的方向：一个衰败古国正在战争中重新聚合，用檄文唤醒臣民，用铁与红石重铸军队，也把未来的恩典、雷霆、债务与裂缝一并推到台前。每一则新闻都是一块砖，垒起睡狮苏醒的丰碑；每一块砖下也压着阴影，提醒后来者，帝国的强光越盛，未决之事也越多。天下今日读到的是捷报、惊变或裁决，史书明日读到的，却可能是崩盘之前的序章。"
   HJM_news.11.a: "王师所至，箪食壶浆。"

   HJM_news.12.t: "黄金打开猪灵堡垒"
   HJM_news.12.d: "猪灵堡垒接受了MC帝国的条件。据前线传闻，帝国使团抵达堡垒时，随行矿车装满金锭，红石锁链一节节拖过城门外的黑石道路，亮得连守军都移不开眼。谈判没有持续太久。猪灵们曾为Herobrine作战，曾在下界通道中替魔族守住黄金与军火；可他们也懂得利益，懂得更沉重的黄金意味着更可靠的未来。堡垒城门打开，帝国旗帜升起，猪灵自治区随即成立。外界对此反应复杂：有人讥笑猪灵背叛太快，称他们不过是把忠诚按重量出售；有人赞叹帝国不费一兵一卒便撬开魔族防线，称黄金攻势胜过一场血战。帝国官方没有否认黄金的作用，只说王师征服天下，并非时时都要拔剑。剑能破城，粮能稳民，金也能开门。黄金攻势证明，睡狮苏醒后的帝国并不只有雷霆，还有价码、秩序和计算。只是当城门因黄金而开，天下也会记住：帝国不仅知道如何杀敌，也知道如何收买敌人的明天。\n\n这则消息传遍各国时，真正震动天下的并非单一事件本身，而是它被放进同一条帝国叙事之后显出的方向：一个衰败古国正在战争中重新聚合，用檄文唤醒臣民，用铁与红石重铸军队，也把未来的恩典、雷霆、债务与裂缝一并推到台前。每一则新闻都是一块砖，垒起睡狮苏醒的丰碑；每一块砖下也压着阴影，提醒后来者，帝国的强光越盛，未决之事也越多。天下今日读到的是捷报、惊变或裁决，史书明日读到的，却可能是崩盘之前的序章。"
   HJM_news.12.a: "黄金也能攻城。"

   HJM_news.13.t: "岩浆之臣"
   HJM_news.13.d: "玄武岩城邦正式臣服于MC帝国。这座悬于岩浆海之上的城邦曾被视为不可征服，玄武岩、黑石与烈焰构成它的城墙，魔族技术工坊藏在热浪深处，外来军队往往还未靠近便被高温、地形和守军消磨殆尽。如今，城邦代表走入帝国军营，献上图纸、工匠、熔炉记录和投降书，换取以藩属身份保全自身。帝国宣布设立玄武自治区，将其军工技术纳入帝国体系，并由总督监督改组。支持者称这是温和纲领的又一胜利：不毁其火，而使火为帝国所用；不沉其城，而使城成为主世界反攻下界的工坊。城邦旧贵族则在沉默中交出印信，明白从此以后，岩浆海上燃烧的每一炉矿、每一张图纸、每一门火炮，都要先回答帝国的需求。岩浆海仍然沸腾，但火焰已经换了主人。主世界史官在这一页写下：火，从来只臣服于更大的火。今日，玄武岩城邦俯首，帝国的火焰又添一脉。\n\n这则消息传遍各国时，真正震动天下的并非单一事件本身，而是它被放进同一条帝国叙事之后显出的方向：一个衰败古国正在战争中重新聚合，用檄文唤醒臣民，用铁与红石重铸军队，也把未来的恩典、雷霆、债务与裂缝一并推到台前。每一则新闻都是一块砖，垒起睡狮苏醒的丰碑；每一块砖下也压着阴影，提醒后来者，帝国的强光越盛，未决之事也越多。天下今日读到的是捷报、惊变或裁决，史书明日读到的，却可能是崩盘之前的序章。"
   HJM_news.13.a: "火焰换了主人。"

   HJM_news.14.t: "烬化政策实施"
   HJM_news.14.d: "MC帝国在洞穴聚落旧土实施烬化政策。曼谷陷落后，帝国没有选择宽恕。工厂被拆毁，仓库被焚烧，旧军营被清空，城市重新划入总督管辖。大批人口从地图册与征税册上的数字中消失，留下的只是被命令反复碾压过的焦土。帝国宣传机构宣称，只有焦土才不会再结出叛乱之花；边境士兵则说，这是对所有背叛者的回答。洞穴聚落曾在Herobrine麾下为魔族开路，曾把主世界村庄当成可被掠夺的粮仓，如今它必须尝到被连根拔起的滋味。外界第一次真正恐惧这个刚刚苏醒的帝国。此前人们看见它发布战争咨文，看见它缔结协约，看见它在失地后重新站起；今日他们看见的是另一面：帝国既能施舍雨露，也能降下雷霆，而雷霆落下时，几乎没有声音能活着传出来。烬化政策不只摧毁一片土地，也在天下心中刻下一道焦黑的界线：帝国的仁德有边界，越过边界者，便只配与灰烬为伍。\n\n这则消息传遍各国时，真正震动天下的并非单一事件本身，而是它被放进同一条帝国叙事之后显出的方向：一个衰败古国正在战争中重新聚合，用檄文唤醒臣民，用铁与红石重铸军队，也把未来的恩典、雷霆、债务与裂缝一并推到台前。每一则新闻都是一块砖，垒起睡狮苏醒的丰碑；每一块砖下也压着阴影，提醒后来者，帝国的强光越盛，未决之事也越多。天下今日读到的是捷报、惊变或裁决，史书明日读到的，却可能是崩盘之前的序章。"
   HJM_news.14.a: "焦土不会再背叛。"

   HJM_news.15.t: "城门血海"
   HJM_news.15.d: "猪灵堡垒的城门下，血水漫过车轮。帝国军队攻入拉合尔后，没有接受堡垒守军的集体投降。军工厂被拆毁，兵营被清空，金库被查封，幸存者被押到新总督面前宣誓效忠。猪灵自治区仍然成立了，但它不是黄金买来的附庸，而是从血泊里捞起的一枚印章。此前的黄金攻势证明帝国可以用价码打开城门；城门血海则证明，当价码被拒绝，帝国也能用剑锋把门劈开。前线士兵把这一天称作城门血海，帝国官方没有否认这个名字，只在公告末尾写道：剑锋已经出鞘，帝国绝不低头。外界因此看见温和与复仇之间的真正差别。温和线保留城市、保留工坊、保留地方结构，让旧敌在总督令下继续呼吸；复仇线则先让敌人记住疼痛，再允许他们以残破身份活下去。猪灵曾把黄金视为唯一真理，如今它们在城门下学会另一条真理：帝国的车轮若被血挡住，便从血上碾过。\n\n这则消息传遍各国时，真正震动天下的并非单一事件本身，而是它被放进同一条帝国叙事之后显出的方向：一个衰败古国正在战争中重新聚合，用檄文唤醒臣民，用铁与红石重铸军队，也把未来的恩典、雷霆、债务与裂缝一并推到台前。每一则新闻都是一块砖，垒起睡狮苏醒的丰碑；每一块砖下也压着阴影，提醒后来者，帝国的强光越盛，未决之事也越多。天下今日读到的是捷报、惊变或裁决，史书明日读到的，却可能是崩盘之前的序章。"
   HJM_news.15.a: "把车轮放平。"

   HJM_news.16.t: "岩浆之下"
   HJM_news.16.d: "玄武岩城邦沉入岩浆之下。帝国工兵越过沸腾的岩浆海，将TNT与红石线路铺进城邦核心，沿黑石梁柱、熔炉底座和军工区外墙设置连锁爆破。爆炸发生时，整座岛屿像被一只看不见的手按进熔流。黑石开裂，城墙倾倒，魔族工程师曾引以为傲的技术工坊在火光中坍塌，熔炉与图纸一同沉没。帝国随后宣布成立玄武自治区，但所有人都知道，这片自治区已没有多少旧城邦影子。温和线中的岩浆之臣，是火焰换了主人；复仇线中的岩浆之下，则是帝国先把火按灭，再从余烬里重塑一个听话的行政区。支持者称此举永绝后患，反对者则说帝国亲手毁掉了本可为己所用的技术心脏。可复仇派并不在乎这样的争论。他们只指着被魔族焚毁的村庄问：敌人烧我们土地时，可曾怜惜过我们的未来？岩浆吞没了一切，也吞没了帝国最后一点犹豫。火，从来只臣服于更大的火；而今日，更大的火选择毁灭。\n\n这则消息传遍各国时，真正震动天下的并非单一事件本身，而是它被放进同一条帝国叙事之后显出的方向：一个衰败古国正在战争中重新聚合，用檄文唤醒臣民，用铁与红石重铸军队，也把未来的恩典、雷霆、债务与裂缝一并推到台前。每一则新闻都是一块砖，垒起睡狮苏醒的丰碑；每一块砖下也压着阴影，提醒后来者，帝国的强光越盛，未决之事也越多。天下今日读到的是捷报、惊变或裁决，史书明日读到的，却可能是崩盘之前的序章。"
   HJM_news.16.a: "岩浆吞没了一切。"

   HJM_news.17.t: "摄政时代降临"
   HJM_news.17.d: "人皇 Notch 崩逝的消息终于得到确认。帝国首都陷入短暂而可怕的寂静，钟楼没有立刻鸣响，议事厅也没有立刻发出公告。这个垂垂老矣的强人曾在最危急时走出宫门，以一道口谕唤醒帝国；他在时，保皇党、村民军、穿越者、总督与地方旧臣都能暂时把矛盾压在王冠之下。如今王冠仍在，压住裂缝的人却不在了。保皇党旧臣簇拥 Jeb，宣称正朔不绝；穿越者代表菲尔·斯宾塞则以摄政之名接管朝政，拿出战时授权、协约条款与重建方案，证明自己拥有维持帝国运转的能力。四色窗徽第一次悬挂在帝国议事厅中，与旧王冠并列，却比旧王冠更接近命令、预算与军队。官方公告称，这只是战后秩序的临时安排；街头巷尾却都明白，帝国已经越过一道门槛。穿越者曾是帝国最锋利的剑，如今那柄剑开始学习如何握住帝国本身。摄政时代降临，胜利后的欢呼尚未散尽，发酵的裂缝已经在石板下生长。\n\n这则消息传遍各国时，真正震动天下的并非单一事件本身，而是它被放进同一条帝国叙事之后显出的方向：一个衰败古国正在战争中重新聚合，用檄文唤醒臣民，用铁与红石重铸军队，也把未来的恩典、雷霆、债务与裂缝一并推到台前。每一则新闻都是一块砖，垒起睡狮苏醒的丰碑；每一块砖下也压着阴影，提醒后来者，帝国的强光越盛，未决之事也越多。天下今日读到的是捷报、惊变或裁决，史书明日读到的，却可能是崩盘之前的序章。"
   HJM_news.17.a: "摄政王来了。"

   HJM_news.18.t: "下界战争告终"
   HJM_news.18.d: "MC帝国宣布下界战争主要战事结束。来自传送门前线的最后一批战报显示，Herobrine 的下界军团已经失去成体系抵抗能力，黑石堡垒被逐一接管，烈焰工坊停火，恶魂瞭望点被拆毁，曾经源源不断向主世界输送尸潮与恐惧的通道，如今由帝国工兵、村民警备队与穿越者联合封锁。主世界各地钟楼随即鸣响，村民们把矿镐、弓弩和临时军旗挂在广场上，庆祝他们从黑暗边缘重新夺回白昼。帝国宣传机关称此役为中兴之战，称古老帝国在危亡中醒来，以血肉、红石、铁傀儡和方外奇术打碎了下界魔影。可是外交使团在祝贺辞之外，也注意到帝国并未解除全部战时状态。边境仍有军队集结，附庸地区仍在等待裁定，重建账册堆满各地官署，凯旋军列带回的伤兵比鲜花更多。更耐人寻味的是，国都公告在胜利字样后使用了战事暂告一段落的说法，而非天下太平。外界因此开始猜测，帝国真正的难题也许才刚刚出现：它能赢下一场大战，却未必能轻易消化胜利带来的土地、仇恨、军权和新盟友。下界的火熄灭了，主世界的政治炉膛却烧得更旺。\n\n这则消息传遍各国时，真正震动天下的并非单一事件本身，而是它被放进同一条帝国叙事之后显出的方向：一个衰败古国正在战争中重新聚合，用檄文唤醒臣民，用铁与红石重铸军队，也把未来的恩典、雷霆、债务与裂缝一并推到台前。每一则新闻都是一块砖，垒起睡狮苏醒的丰碑；每一块砖下也压着阴影，提醒后来者，帝国的强光越盛，未决之事也越多。天下今日读到的是捷报、惊变或裁决，史书明日读到的，却可能是崩盘之前的序章。"
   HJM_news.18.a: "火熄了，账还在。"

   HJM_news.19.t: "摄政政府发布各地奏报"
   HJM_news.19.d: "MC帝国摄政政府今日发布战后各地奏报摘要。这份文件没有凯旋演说那样激昂，也没有战争咨文那样锋利，却让各国观察者第一次看清帝国胜利后的真实轮廓。奏报称，主世界边境村庄正在恢复生产，但大量地区仍需粮食、木材、铁器与驻军保护；下界旧堡垒进入军事管制，部分猪灵与玄武岩工匠被重新登记；末地门户周边局势仍不稳定，王庭与北境残余之间的矛盾尚未完全熄灭；洞穴、堡垒、城邦等新藩属表面承认帝国权威，却需要总督、军队与财政补助同时维持。文件还承认，战时动员使中央军权扩张，穿越者在军工、交通、红石通信和前线指挥中拥有不可替代的地位，后续将由摄政议事厅统一审定其权限。这个措辞立即引发诸国议论：旧王冠仍被尊为法统象征，真正的表格、印玺和预算却已经从宫廷流向摄政班底。帝国把各地情况汇总为一份文书，仿佛只要写清哪里缺粮、哪里缺兵、哪里缺忠诚，天下就能重新归于秩序。然而读得越细，人们越能从字里行间看见另一种未来。胜利没有让帝国回到旧日，它只是把旧日的裂缝照得更亮。\n\n这则消息传遍各国时，真正震动天下的并非单一事件本身，而是它被放进同一条帝国叙事之后显出的方向：一个衰败古国正在战争中重新聚合，用檄文唤醒臣民，用铁与红石重铸军队，也把未来的恩典、雷霆、债务与裂缝一并推到台前。每一则新闻都是一块砖，垒起睡狮苏醒的丰碑；每一块砖下也压着阴影，提醒后来者，帝国的强光越盛，未决之事也越多。天下今日读到的是捷报、惊变或裁决，史书明日读到的，却可能是崩盘之前的序章。"
   HJM_news.19.a: "胜利之后，仍要统治。"
