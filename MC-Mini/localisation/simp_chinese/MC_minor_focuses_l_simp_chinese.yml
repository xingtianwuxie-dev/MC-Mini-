l_simp_chinese:
   GWG_cave_council: "洞穴长老会议"
   GWG_cave_council_desc: "洞穴聚落不能只靠黑暗与本能维持秩序。各处坑道的长老、监工与武装头目必须坐到同一张石桌前，决定粮食、巡逻和贡赋如何分配。"
   GWG_tunnel_workshops: "坑道工坊"
   GWG_tunnel_workshops_desc: "废弃矿井和地下仓库可以改造成简易工坊。只要把分散的矿镐、熔炉和运输轨道统一登记，洞穴聚落就能拥有一套真正可用的生产体系。"
   GWG_zombie_militia: "僵尸民兵"
   GWG_zombie_militia_desc: "聚落的守卫不能只在敌人闯入洞口后才挥动武器。我们将把各坑道的青壮与游荡尸群编成民兵，使黑暗本身成为防线的一部分。"
   GWG_dark_patrols: "黑暗巡逻"
   GWG_dark_patrols_desc: "夜色和洞穴是我们的天然盟友。固定巡逻路线、哨点火把和暗道信号之后，任何进入地下的外敌都会发现自己已经被黑暗盯上。"
   GWG_hold_the_depths: "守住深处"
   GWG_hold_the_depths_desc: "洞穴聚落没有广阔平原，也没有高大城墙；我们的国土就是深处本身。只要坑道仍在我们手中，聚落就不会真正灭亡。"

   LLL_mansion_council: "府邸议会"
   LLL_mansion_council_desc: "林地府邸的每一座高塔都藏着野心。唤魔者、卫道士与掠夺者必须接受同一个议会号令，否则府邸会先被自己的阴谋吞噬。"
   LLL_woodland_stores: "林地储藏室"
   LLL_woodland_stores_desc: "府邸深处堆满被劫掠来的木材、粮食、铁器与红石零件。清点这些储藏，可以让林地府邸从盗匪巢穴变成小型战争机器。"
   LLL_vindicator_drills: "卫道士操练"
   LLL_vindicator_drills_desc: "卫道士的斧头足够锋利，但战场需要的不只是凶狠。整队、轮换、伏击与撤离都必须成为他们新的本能。"
   LLL_totem_watch: "图腾守望"
   LLL_totem_watch_desc: "不死图腾既是仪式，也是权威。以图腾为名设置哨戒与传令体系，林地府邸的各层楼阁就能像一座活着的堡垒一样反应。"
   LLL_raid_the_border: "袭扰边境"
   LLL_raid_the_border_desc: "林地府邸不会坐等敌人来敲门。边境村庄、道路与补给线都是猎物，而每一次袭扰都会让敌人记住林地的阴影。"

   MDG_end_court: "末地王庭"
   MDG_end_court_desc: "末地不能永远依靠沉默维系统治。末影贵族、龙裔近卫与传送门守军必须重新承认王庭命令，让紫色荒原拥有一个清晰的中心。"
   MDG_chorus_workshops: "紫颂工坊"
   MDG_chorus_workshops_desc: "紫颂果、末地石与漂浮城遗迹都能成为生产资源。王庭将整合这些作坊，让末地不再只是遥远的边疆。"
   MDG_ender_guards: "末影近卫"
   MDG_ender_guards_desc: "末影近卫守护王庭，也守护传送门。整编之后，他们将成为末地最可靠的武装核心。"
   MDG_portal_registry: "传送门登记"
   MDG_portal_registry_desc: "传送门是道路，也是裂缝。王庭必须知道每一道门通往何处、由谁看守、何时开启。"
   MDG_guard_the_void: "守望虚空"
   MDG_guard_the_void_desc: "虚空不是空无，而是末地最后的边界。只要边界仍被守望，王庭便仍能宣称自己统御这片紫色世界。"

   MYR_rebel_camp: "起义军营地"
   MYR_rebel_camp_desc: "末影人起义军由愤怒、流亡与野心拼凑而成。若要真正挑战王庭，首先就要让各路头目承认一个共同营地。"
   MYR_hidden_supplies: "隐蔽补给"
   MYR_hidden_supplies_desc: "起义无法靠口号维持。藏在北境荒原、废塔和暗门后的补给必须被清点出来，供给一场长期战争。"
   MYR_shadow_spears: "暗影长矛"
   MYR_shadow_spears_desc: "起义军的优势在于突然出现，也在于突然消失。暗影长矛部队将把这种本能变成真正的战术。"
   MYR_break_the_court: "击碎王庭"
   MYR_break_the_court_desc: "王庭自称正统，北境却只看见锁链。每一份檄文、每一次伏击、每一场胜利都必须指向同一个目标：击碎王庭。"
   MYR_northern_oath: "北境誓约"
   MYR_northern_oath_desc: "北境诸部需要一个共同誓言。只要这份誓约仍在，末影人起义军就不只是叛乱，而是另一种末地未来。"

   XWY_basalt_senate: "玄武岩议会"
   XWY_basalt_senate_desc: "玄武岩城邦由熔炉、工坊和商道维系。议会必须重新压住各城邦的争执，让火山边的秩序继续运转。"
   XWY_magma_forges: "岩浆熔炉"
   XWY_magma_forges_desc: "岩浆是危险，也是财富。只要让熔炉按统一规格生产，玄武岩城邦就能把脚下的热浪铸成武器。"
   XWY_slime_levies: "史莱姆征召"
   XWY_slime_levies_desc: "城邦周边的史莱姆部族熟悉沼泽、熔岩与黑石通道。征召他们，可以让我们的军队更适应这片破碎土地。"
   XWY_lava_channels: "熔岩渠防线"
   XWY_lava_channels_desc: "熔岩渠既能驱动工坊，也能阻挡敌人。重新开挖与封锁关键渠道后，城邦会变得更难被攻陷。"
   XWY_blackstone_line: "黑石防线"
   XWY_blackstone_line_desc: "黑石并不华丽，却足够坚固。我们将在城邦外围建立连贯防线，让敌人在滚烫石墙前耗尽勇气。"

   ZLG_bastion_ledger: "堡垒账册"
   ZLG_bastion_ledger_desc: "猪灵懂黄金，也懂账册。只要把各氏族金库、债务和军役重新登记，堡垒就能重新掌握自己的命脉。"
   ZLG_gold_workshops: "黄金工坊"
   ZLG_gold_workshops_desc: "黄金不只能装饰王座，也能购买忠诚、驱动贸易、扩建工坊。猪灵堡垒会让每一块金锭都变成力量。"
   ZLG_piglin_warbands: "猪灵战帮"
   ZLG_piglin_warbands_desc: "各氏族战帮必须学会在同一面旗帜下作战。为了堡垒、金库和黑石城墙，他们会暂时放下旧怨。"
   ZLG_barter_oaths: "以物易物誓约"
   ZLG_barter_oaths_desc: "猪灵的誓言写在交易里。只要利益被绑定在一起，各氏族就会明白，背叛堡垒也是背叛自己的金库。"
   ZLG_defend_the_bastion: "保卫堡垒"
   ZLG_defend_the_bastion_desc: "堡垒是家园、金库与权力的总和。若敌人胆敢越过黑石大门，猪灵会让他们用血支付入场费。"
