l_simp_chinese:
 #HJM国策
 MC_start: "MC帝国之始"
 HJM_underground_riot: "山雨欲来"
 HJM_illager_spy: "他们在干什么"
 HJM_brother_returns: "13号唱片"
 HJM_village_defense: "加强村庄防备"
 HJM_iron_golem: "铸就铁拳"
 HJM_redstone_research: "加强红石科技研究"
 HJM_redstone_cannon: "红石大炮"
 HJM_outsider_contact: "加强方外势力接触"
 HJM_player_pact: "穿越者协约"
 HJM_liberate_village: "魔族战争咨文"
 HJM_player_general: "任命穿越者将领"
 HJM_nether_strike: "奇兵暗度"
 HJM_dignity_blade: "尊严只在剑锋之上"
 HJM_total_war: "这是全面战争"
 HJM_liberate_nether: "一定要解放下界"
 HJM_MC_start: "MC帝国"
 HIM_demon_host: "魔族"
 HIM_evil_resurgence: "邪恶复苏"
 HIM_nether_mobilization: "下界整备"
 HIM_illager_defectors: "叛变者投诚"
 HIM_open_the_gate: "开门！解放末地"
 HIM_overworld_dominion: "君临主世界"
 HIM_zombie_siege: "僵尸围城"
 HIM_sky_is_not_the_limit: "天空不是极限"
 #HJM国策描述
 MC_start_desc: "起初，人皇不过是整合了周边几个零散的村庄。但百年飘摇间，城邦林立，田野广布，一个帝国正在升起，成为这个世界唯一的太阳。而后，MC帝国必将光耀百世，名震古今。"
 HJM_underground_riot_desc: "老人们看到牛羊的骚乱，边疆也频传异动，山雨欲来风满楼。MC帝国不害怕挑战，只怕风雨还不够猛烈。帝国不知道威胁在何方，因为所有的威胁都将被扫平。"
 HJM_illager_spy_desc: "他们在干什么？身为帝国的归化异族，活在阴影中的灾厄村民如今却格外活跃。他们在林地府邸重燃烽火，灰色的皮肤游走在边境线上传递密信。他们到底在为谁服务？倘若背叛，帝国不会姑息。"
 HJM_brother_returns_desc: "是谁播放了13号唱片！是谁在传播恐怖的回归！魔族曾因零散而无足挂齿，但如若HEROBRINE的传言为真，无脑的魔族们将会在他一人的旗帜下集结成军。帝国无惧挑战，但我们必须做点什么。"
 HJM_village_defense_desc: "战争是进攻和防御的不断的交替和结合，单有无往不利的矛却无坚不可摧的盾是万万不可。现在边境村庄都得全副武装，让胆敢进犯的敌人作出回答！"
 HJM_iron_golem_desc: "村子里的铁会铸成护卫，村子里的村民会成为精锐。制造铁傀儡，就是铸就铁拳。他们不关心什么是魔族，什么是神，他们只会出拳。不要停下，直到钢铁成为长城。"
 HJM_redstone_research_desc: "红色的矿石可以传导信号，红光在线路上闪烁，叫远方的灯光亮起。不要低估红石的力量，它能让矿车永无止境地奔流，也能让武器更具威胁。加强红石科技研究，帝国的基石需要一抹红色。"
 HJM_redstone_cannon_desc: "世界上只有两种人，炮兵和他的目标！我们将完善红石系统的控制，提高TNT的当量。射程范围内，帝国的火炮就是真理。"
 HJM_outsider_contact_desc: "村庄里来了群异乡人，他们无所不能，又能起死回生。祭司说他们与吾皇一样伟大，同僚们说他们可以比肩一个帝国。帝国的外交部应该懂得如何接触这么一股力量。"
 HJM_player_pact_desc: "穿越者们决出一个代表，单枪匹马闯进国都，大刀阔斧立下合作协约。他们会成为帝国最锋利的剑，为帝国扫清一切障碍。与此相应的，他们要求在帝国内享有特殊的权力。阳光下，紫色的光晕在他的铠甲上闪耀，帝国乐意看到协约的确立。"
 HJM_liberate_village_desc: "那一天终究是到来了，自从唱片播放以来我们便枕戈待战，现在是时候把他们彻底赶出这片大陆了！"
 HJM_player_general_desc: "穿越者们给我们的进攻带来了巨大帮助，他们似乎已经身经百战。帝国可以提拔一些穿越者成为前锋，他们的经验将会将我军导向胜利。"
 HJM_nether_strike_desc: "魔族军队主力集中在前线，而后方却空无一人。穿越者将领敏锐的察觉到了这一点，穿越者提出的地狱门跃迁构想将打魔族个措手不及。不错，现在开门！"
 HJM_dignity_blade_desc: "曾几何时，所有人都认为帝国会盛世永续。奈何魔族入侵，意欲染指中原。儿郎们，举起锋芒，既然他们敢来，就用他们的血浇铸丰碑，他们的头垒起京观。捍卫帝国的尊严！尊严只在剑锋之上！"
 HJM_total_war_desc: "《全面战争法案》被通过。帝国从未如此上下齐心。我们要动员帝国全境，民用工厂将转产军用物资，村民们将获得制式装备。现在已经到了全力一搏的时候了！"
 HJM_liberate_nether_desc: "这场战争始于那里，帝国旗帜将从每一座下界要塞上升起，我们一定要解放下界！"
 #HIM国策描述
 HIM_demon_host_desc: "主世界的人类把我们写成传说，把下界称作荒芜之地。他们错了。魔族并非散乱的怪物，而是一支等待命令的军队。现在，旗帜已经升起。"
 HIM_evil_resurgence_desc: "Herobrine的名字重新回到祭坛与军营之间。僵尸听见了召唤，骷髅取下了旧弓，烈焰人的火焰在要塞中连成一片。沉睡的邪恶并未消亡，它只是在等待归来。"
 HIM_nether_mobilization_desc: "下界并不是一个国家，而是一片由要塞、岩浆海和各族巢穴拼合而成的战场。要让它服务于同一个目标，就必须先把它铸造成一台战争机器。"
 HIM_illager_defectors_desc: "灾厄村民比任何人都了解主世界的村庄。他们憎恨村民，也憎恨那些保护村民的人。如今，他们愿意开启传送门，作为投诚的第一份礼物。"
 HIM_open_the_gate_desc: "下界传送门证明了世界之间的边界可以被撕开。末地不该继续沉默。只要传送门被点亮，末影之地的力量也将被拖入我们的战争。"
 HIM_overworld_dominion_desc: "主世界的天空、村庄、矿洞和城墙都将承认新的主人。我们不再满足于阴影中的袭扰，魔族要在阳光之下建立统治。"
 HIM_zombie_siege_desc: "尸潮不需要补给线，也不需要军饷。它们只需要一个方向。第一座村庄倒下时，整个主世界都会明白：这不是边境冲突，这是世界大战的开始。"
 HIM_sky_is_not_the_limit_desc: "人类以为城墙能挡住尸潮，以为高山能挡住军队，以为天空是最后的边界。下界的火焰将升入云层，战争不会停在地面。"
 #HIM国策
 HIM_evil_resurgence_threat: "Herobrine的邪恶复苏"
 HIM_nether_mobilization_bonus: "下界整备"
 HIM_end_portal_bonus: "末地传送门研究"
 HIM_open_the_gate_threat: "末地传送门被开启"
 HIM_zombie_siege_threat: "僵尸围城"
 HIM_sky_is_not_the_limit_bonus: "天空不是极限"
 HJM_redstone_radio_bonus: "红石通信研究"
 HJM_redstone_artillery_bonus: "红石火炮研究"
 #HIM事件
 HIM.1.t: "魔族集结"
 HIM.1.d: "下界的各个巢穴、要塞和废弃矿道传来了同一个命令。零散的怪物不再各自游荡，它们开始在同一面旗帜下集合。魔族不再只是人类故事里的恐惧，它已经有了军队的形状。"
 HIM.1.a: "黑暗终于有了秩序。"
 HIM.2.t: "邪恶复苏"
 HIM.2.d: "Herobrine 的名字重新被刻进祭坛。僵尸听见召唤，骷髅取下旧弓，烈焰人的火焰在要塞深处连成一片。远在主世界，某张旧唱片也将被这阵低语唤醒。"
 HIM.2.a: "让他们听见。"
 HIM.3.t: "下界整备"
 HIM.3.d: "岩浆海旁的要塞开始扩建，黑石平台上堆满武器，灵魂沙谷中响起训练的脚步声。下界从来不适合秩序，但它可以适合战争。"
 HIM.3.a: "把下界铸成兵营。"
 HIM.4.t: "叛变者投诚"
 HIM.4.d: "灾厄村民带来了主世界村庄的地图、巡逻路线和防御习惯。他们并不忠诚于魔族，但他们足够憎恨村民。仇恨有时比忠诚更可靠。"
 HIM.4.a: "仇恨会为我们开路。"
 HIM.5.t: "开门！解放末地"
 HIM.5.d: "传送门的边界开始松动。下界不是唯一的裂口，末地也不该继续沉默。只要门被点亮，战争就会穿过世界之间的缝隙。"
 HIM.5.a: "点燃传送门。"
 HIM.6.t: "君临主世界"
 HIM.6.d: "阳光之下的村庄、矿洞、森林和城墙都将承认新的主人。魔族不再满足于边境袭扰，主世界必须跪下。"
 HIM.6.a: "主世界属于强者。"
 HIM.7.t: "僵尸围城"
 HIM.7.d: "尸潮不需要军饷，不需要补给，也不需要恐惧。它们只需要一个方向。第一座村庄倒下时，所有人都会明白：战争已经越过了传说的边界。"
 HIM.7.a: "让尸潮前进。"
 HIM.8.t: "天空不是极限"
 HIM.8.d: "人类以为高墙和山脉能保护他们。现在，下界的火焰将升上云层。战争不会停在地面，也不会被天空拦住。"
 HIM.8.a: "抬头看。"
 HIM.9.t: "13号唱片的播放"
 HIM.9.d: "一阵破碎、低沉的旋律从唱片机中传出。它不像音乐，更像某种被封存的记忆。议会厅里无人说话，但所有人都知道，那不是普通的唱片。某个被刻意遗忘的名字，正在从黑暗中回到主世界。"
 HIM.9.a: "唱片已经开始播放。"

#HJM事件
 HJM.1.t: "MC帝国之始"
 HJM.2.t: "地下动乱"
 HJM.3.t: "边境异常"
 HJM.4.t: "灰皮人的密信"
 HJM.5.t: "那个被抹去的名字"
 HJM.6.t: "方外来客"
 HJM.7.t: "围城"
 HJM.8.t: "外来的指挥官"
 HJM.9.t: "穿越地狱门"
 HJM.10.t: "前线整肃"
 HJM.11.t: "演说"
 HJM.12.t: "帝国总动员"
 HJM.13.t: "下界的帝国旗帜"
 HJM.19.t: "消失的哨兵"
 HJM.20.t: "灰烬中的脚印"
 HJM.21.t: "不属于村庄的密语"
 HJM.1.d: "MC帝国，这古老而神秘的沙盒帝国，其命运如今系于你手。雄心勃勃却垂垂老矣的人皇Notch，他承载着MC帝国的未来，你将抉择MC帝国的航向。魔族的威胁仍旧存在，一些自称“迷你”的异族人对MC领土亦是虎视眈眈。你的每一个选择都将深刻影响MC帝国的未来。现在，是时候做出你的决策了！MC帝国必将繁荣昌盛！"
 HJM.2.d: "旧版事件，v2.0 已废弃，保留兼容。"
 HJM.3.d: "边境村庄的报告不再是孤立事件了，[Root.GetLeader]。牲畜夜里失踪，没有足迹通向远方。东区巡逻队发现了脚印——人形的，但比任何村民都要大，深深烙进泥土里，仿佛地面本身被灼烧过。地方驻军请求批准提高警戒级别。"
 HJM.4.d: "监视网产出了结果，而结果并不让人安心。我方特工截获了来自灾厄村民前哨的一份密信——经过加密，但解密碎片中出现的语言不属于主世界的任何一种。更糟的是：这条信号看起来是一封回信。有人已经和灾厄村民通信了数月之久，而我们不知道对方是谁。"
 HJM.5.d: "情报报告在议会桌上放了一整分钟才有人开口。边境之外敌对势力的指挥官身份已经确认。那双眼睛。攻击模式。亡灵的行军方式——不是兽群，而是队列。是 Herobrine。[Root.GetLeader] 已经多年没有提过他弟弟的名字了。但议会现在必须决定，该如何称呼即将到来的事物：叛乱，还是战争。"
 HJM.6.d: "来自边境之地之外的使者抵达了首都。他们的外表并不引人注目——如果不仔细看，会像普通村民一样融入人群。但他们的眼神不一样。他们看我们的世界，就像一个工匠看一张工作台。协议已经签署。玩家将与帝国并肩作战。他们的代表在签署之前只问了一个问题：'敌人在哪？'"
 HJM.7.d: "它发生得比任何侦察兵预测的都要快。僵尸编队在黄昏越过边境——不是散兵游勇，不是漫无目的，而是协同的波次进攻。到了午夜，三座边境村庄已被包围。铁傀儡撑住了阵线。红石大炮打到电路烧毁。黎明时分，尸潮退去。村庄仍然屹立。但战争已经开始，而帝国没有开第一枪。"
 HJM.8.d: "第一批穿越者军官已经在帝国指挥链中到任。老的将军们不太高兴——有人递交了正式抗议。但穿越者带来了我们的军事学院无法命名的战术学说，而他们的第一次实战演习将第三边防师的反应时间缩短了一半。抗议信仍然躺在议会桌上，无人翻阅。"
 HJM.9.d: "突击部队在黑曜石框架前集结——四格宽的框架内，紫色光晕翻腾涌动。穿越者指挥官已经为这一刻训练了数周的部队。他们的计划不是帝国将军会设计的方案。它依赖速度、混乱，以及一种穿越者称之为'蹲出生点'的战术。老将军们不理解这个词的含义。他们更不理解的是，为什么它可能会奏效。"
 HJM.10.d: "前线部队完成了整肃。旧的迟疑和观望被命令压下，帝国军队将以更清晰的目标继续推进。"
 HJM.11.d: "指挥官站在全体军官面前，从墙上取下一把钻石剑，剑尖钉入作战桌，说：'尊严只在剑锋之上。'天亮之前，前进的命令已经送达前线每一个师。"
 HJM.12.d: "帝国议会全票通过了《全面战争法案》——帝国短暂历史上的第一次全票。每一座民用工厂都将转产或兼产军用物资。每一个适龄村民都将接受标准化装备和基础训练。铁匠铺的炉火不需要命令就烧到了天亮。帝国不再是一个处于战争中的国家。它是一场恰好拥有一个国家的战争。"
 HJM.13.d: "第一面帝国旗帜已经插上了下界要塞的城墙。烈焰人的制造厂无人看管地燃烧着。凋零骷髅守备队四散而逃。在要塞深处，我们的部队发现了一间指挥室——主世界的地图钉满了墙壁，部队位置用恶魂之泪标记。战争没有结束，但士兵们第一次开始谈论回家。"
 HJM.19.d: "边境警戒令下达后，第七哨塔在第三个夜晚失去联系。救援队抵达时，哨塔的火把仍然燃着，床铺整齐，武器架没有被打开。只有瞭望台边缘留下了几道焦黑的抓痕，像是有人从阴影里把守军拖走。"
 HJM.20.d: "侦察队沿着哨塔外的痕迹深入林地，发现一串被雨水也冲不掉的脚印。它们不像僵尸，也不像灾厄村民。脚印旁的草叶被烤干，泥土里混着来自下界的灰烬。军官们终于承认：这不是普通的边境骚乱。"
 HJM.21.d: "截获站在午夜捕捉到一段断续信号。它由灾厄村民的短促哨声、骨骼碰撞般的节拍和某种低沉回声混合而成。译员无法完整破译，但反复出现的坐标指向了帝国村庄。有人在标记目标。有人在为下一步行动铺路。"
 HJM.1.a: "帝国万岁！"
 HJM.2.a: "镇压动乱"
 HJM.2.b: "谈判解决"
 HJM.3.a: "批准警戒。外面有东西。"
 HJM.3.b: "可能只是野生的苦力怕。不必惊动村民。"
 HJM.4.a: "他们两边下注。假定我方一切情报都已泄露。"
 HJM.4.b: "也许可以策反他们。双面间谍可以再被翻一次。"
 HJM.5.a: "该叫什么就叫什么。这是战争。"
 HJM.6.a: "欢迎来到主世界。"
 HJM.7.a: "他们出了招。轮到我们了。"
 HJM.8.a: "战果比军衔更有说服力。"
 HJM.8.b: "老将们有道理。限制穿越者的指挥权。"
 HJM.9.a: "点燃传送门。行动开始。"
 HJM.10.a: "继续推进。"
 HJM.11.a: "向前。"
 HJM.12.a: "一切为了胜利。"
 HJM.13.a: "我们为答案而来，带着胜利离开。"
 HJM.19.a: "派出侦察队，找到答案。"
 HJM.20.a: "把报告送回首都。"
 HJM.21.a: "把所有边境村庄列入警戒名单。"
 HJM.14.t: "村庄防御网建成"
 HJM.14.d: "工程队已经完成了边境防御工事的建设。哨塔在月光下投出狭长的影子，圆石城墙围住了每一座村庄的边界，壕沟里灌满了水。地方驻军指挥官报告：如果再遭到突袭，每一座村庄都能够独自支撑至少三天。"
 HJM.14.a: "让魔族来试试。每一座村庄都是一座要塞。"
 HJM.15.t: "铁傀儡兵团就位"
 HJM.15.d: "第一批量产铁傀儡已经部署到边境村庄。它们不说话，不吃粮，不需要任何命令——只是站在村口，一动不动，像一个铁铸的承诺。有村民声称看到一个铁傀儡单手掀翻了一整辆矿车。虽然未经证实，但这故事在村庄之间传得比矿车还快。"
 HJM.15.a: "不需要军饷的士兵，是最好的士兵。"
 HJM.16.t: "红石军事实验室"
 HJM.16.d: "帝国军事红石研究所已经在首都成立。最聪明的工程师们挤在一间由废弃矿井改造的地下实验室里，用红石粉、中继器和活塞搭建着从未有人尝试过的电路。他们正在攻克的核心课题只有一个：如何让 TNT 在精确的时间，落在精确的地点。"
 HJM.16.a: "红石不是武器。红石是答案。"
 HJM.17.t: "第一门红石火炮"
 HJM.17.d: "帝国第一门红石大炮在今天清晨完成了试射。测试目标是边境之外的一座废弃下界传送门框架。炮弹落点距离目标不到三格。在场的工程师们沉默了几秒钟——不是因为失望，而是因为他们意识到，他们刚刚发明了这个世界上从未存在过的东西。"
 HJM.17.a: "从今天起，帝国拥有了火力。"
 HJM.18.t: "异域来讯"
 HJM.18.d: "外交部派往边境之地的侦察队带回了一个令人震惊的消息：他们检测到了来自其他维度的信号。信号来源不明，但其模式——重复的、结构化的、有意图的——不可能是自然现象。在边境之地的更远处，有人正在试图联系这个世界。外交部建议立即派遣正式的使节团。"
 HJM.18.a: "找到他们。不管他们在世界的哪一个角落。"
 HJM.22.t: "吞并下界要塞"
 HJM.22.d: "HIM的主力已经崩溃，下界要塞的统治机构失去继续抵抗的能力。帝国军政官开始接管其核心据点，清点军械、封存传送门，并将残余行政系统并入MC帝国。"
 HJM.22.a: "接管下界要塞。"
 HJM.23.t: "吞并LLL"
 HJM.23.d: "LLL作为魔族附庸参与了这场战争。随着HIM覆灭，LLL的旧秩序已经无力独立维系，帝国将直接接收其领土、部队与行政档案。"
 HJM.23.a: "LLL并入帝国。"
 HJM.24.t: "吞并XWY"
 HJM.24.d: "XWY的抵抗在宗主国失败后迅速瓦解。帝国接管委员会进入当地，解除残余武装，并宣布该地区纳入MC帝国管辖。"
 HJM.24.a: "XWY并入帝国。"
 HJM.25.t: "吞并ZLG"
 HJM.25.d: "ZLG的附庸政府已经失去外部支撑。帝国将终止其名义自治，把当地军事、工业与民政系统统一整编。"
 HJM.25.a: "ZLG并入帝国。"
 HJM.26.t: "吞并GWG"
 HJM.26.d: "GWG的战时行政结构已经崩解。帝国部队接管交通节点与军火仓库，新的边境秩序将在这里建立。"
 HJM.26.a: "GWG并入帝国。"
 HJM.27.t: "吞并末地"
 HJM.27.d: "战后秩序已经不再允许末地继续以附庸身份游离于帝国体系之外。蒙古区域的末地政权被正式整合，末影王庭转入帝国监管。"
 HJM.27.a: "末地并入帝国。"
 HJM.28.t: "吞并末影人起义军"
 HJM.28.d: "末影人起义军的叛乱已被镇压。非蒙古地区的末地残余势力被帝国军队重新占领，叛乱领袖和魔族联络网将被彻底清算。"
 HJM.28.a: "末影人起义军并入帝国。"


 #HJM决议


 HJM_record_13_category: "13号唱片"
 HJM_record_13_war_countdown: "13号唱片的回声"
 HJM_record_13_war_countdown_desc: "那张唱片已经开始播放。该任务会显示距离开战还剩多少天；倒计时结束时，HJM 将正式向 HIM 开战。也可以直接选择该任务，立刻发动对 HIM 的战争。"
 HJM_delay_record_13_war: "拖延开战"
 HJM_delay_record_13_war_desc: "动员官僚、安抚议会、重新解释唱片里的噪声。战争倒计时将延后30天，剩余天数显示在“13号唱片的回声”任务上。"


 HJM_war_preparation_category: "战备整顿"
 HJM_war_preparation_category_desc: "边境异常已经从传闻变成报告。帝国可以在战争正式到来前整肃内部、抢修交通、扩张军需和动员民心。"
 HJM_suppress_illager_cells: "打压灾厄暗线"
 HJM_suppress_illager_cells_desc: "清查灾厄村民的联络点，扣押可疑信使，切断那些通往林地府邸和边境哨站的灰色渠道。"
 HJM_build_northern_railway: "抢修漠北军用铁路"
 HJM_build_northern_railway_desc: "调集民用工厂和工程队，为漠北驻军修筑一条临时军用铁路。它不漂亮，但能把补给送到前线。"
 HJM_build_western_railway: "抢修西线军用铁路"
 HJM_build_western_railway_desc: "绥远、西域和塞外驻军之间缺少可靠补给线。工程队将用最快速度铺设可用的军用铁路。"
 HJM_expand_factory_output: "加大工厂产出"
 HJM_expand_factory_output_desc: "延长铁匠铺和军工厂班次，压缩非必要订单，在短期内把更多钢铁和红石设备送进军队仓库。"
 HJM_wartime_propaganda: "战时政治宣传"
 HJM_wartime_propaganda_desc: "告诉村民边境上正在发生什么，也告诉他们为什么必须忍受更高的税负、征发和夜间戒严。"
 HJM_recommission_old_rifles: "重启老旧装备"
 HJM_recommission_old_rifles_desc: "打开旧仓库，清点封存的老式步枪。它们不先进，但比木棍可靠。"


 HJM_wartime_decisions_category: "战时决议"
 HJM_wartime_decisions_category_desc: "战争已经开始，帝国可以采取非常手段补充兵员、鼓动民心、转移工业并支援边疆。"
 HJM_mobilize_militia: "动员民兵"
 HJM_mobilize_militia_desc: "从村庄、矿区和边境聚落中抽调民兵，补充前线兵员和旧式武器。此举会削弱国内稳定。"
 HJM_war_propaganda: "战争宣传"
 HJM_war_propaganda_desc: "通过告示、巡回演讲和村庄集会重申战争目标，提升战争支持，但持续动员会加重社会压力。"
 HJM_third_line_construction: "三线建设"
 HJM_third_line_construction_desc: "把部分工坊、仓库和后备产能转入内陆与山区。短期内提升军工、民工和基础设施建设速度，但会增加民用负担。"
 HJM_support_frontier: "支援边疆"
 HJM_support_frontier_desc: "向边疆道路、哨站和前线补给点派出运输队与工程队，暂时改善部队补给和本土防御。"
 HJM_third_line_construction_modifier: "三线建设"
 HJM_third_line_construction_modifier_desc: "内陆工坊和后方工程队正在全速运转，军需与基础设施建设得到加强，但民用部门承受额外压力。"
 HJM_frontier_support_modifier: "支援边疆"
 HJM_frontier_support_modifier_desc: "边疆补给线得到额外人力和运输队支援，前线部队的消耗与损耗暂时下降。"
#灾厄村民猖獗度
 HJM.illager_tick.a: "（系统）"
 HJM_illager_activity_category: "灾厄村民猖獗度"
 HJM_illager_activity_category_desc: "灾厄村民在边境与村庄暗处结网。若帝国长期不处理，猖獗度会每60天上升一级；投入政治资源清剿可以压低一级。"
 HJM_illager_activity_escalation: "灾厄村民活动扩张"
 HJM_illager_activity_escalation_desc: "如果未来60天内不继续清剿灾厄暗线，灾厄村民猖獗度将上升一个阶段。"
 HJM_reduce_illager_activity: "清剿灾厄暗线"
 HJM_reduce_illager_activity_desc: "投入行政力量、侦察队与地方驻军，切断灾厄村民的联络网。完成后，灾厄村民猖獗度将降低一个阶段，并重新计算下一轮扩张倒计时。"
 HJM_illager_activity_low: "灾厄村民猖獗度：低"
 HJM_illager_activity_low_desc: "灾厄村民的联络网被压回地下。帝国情报保护更可靠，军队训练节奏加快，但长期清查和戒严拖慢了建设进度。"
 HJM_illager_activity_medium: "灾厄村民猖獗度：中"
 HJM_illager_activity_medium_desc: "灾厄村民仍在边境和村庄间活动，暗线时断时续。帝国情报保护出现漏洞，敌人更容易窥探我们的部署。"
 HJM_illager_activity_high: "灾厄村民猖獗度：高"
 HJM_illager_activity_high_desc: "灾厄村民的活动已经公开化。混乱压低了稳定，帝国情报保护也严重恶化，敌人更容易窥探我们的部署。"


 HJM_emergency_factory_output: "加班军需生产"
 HJM_emergency_factory_output_desc: "工厂和铁匠铺进入加班状态，短期军需产能上升，但民用订单被迫延后。"
 HJM_southern_front_crisis: "南线危局"
 HJM_southern_front_crisis_desc: "魔族战争的冲击首先压在帝国南方。边境村庄与补给线一旦失守，帝国全境的抵抗意志都会被迫面对最严酷的考验。"
 HJM_liberate_nether_offensive: "解放下界"
 HJM_liberate_nether_offensive_desc: "帝国已经把战争目标写进军令：下界要塞必须升起MC帝国旗帜，魔族必须被赶出每一条补给线和每一座堡垒。"
 HJM_news.1.t: "MC帝国发布魔族战争咨文"
 HJM_news.1.d: "MC帝国宣布，魔族已经成为主世界秩序的直接威胁。自13号唱片的传言扩散以来，边境冲突、暗线联络和魔族集结不断升级。如今，帝国正式发布战争咨文，宣称将把魔族彻底赶出这片大陆。"
 HJM_news.1.a: "新的战争已经开始。"
 HJM_news.2.t: "MC帝国对魔族宣战"
 HJM_news.2.d: "13号唱片的倒计时终于归零。MC帝国正式向魔族宣战，帝国的军队越过边境，向着魔族占据的领土进发。这场决定两个世界命运的战争，就此打响。"
 HJM_news.2.a: "战争开始了。"
 HJM_news.3.t: "魔族覆灭——帝国全面胜利"
 HJM_news.3.d: "随着魔族最后的抵抗瓦解，MC帝国取得了全面胜利。魔族曾经占据的广袤领土已全部纳入帝国版图。这场旷日持久的战争，终于画上了句号。"
 HJM_news.3.a: "帝国疆域，四海归一。"
 HIM_nether_economy: "下界经济体系"
 HIM_nether_economy_desc: "下界从来不是为工业而生的土地。岩浆海的炽热灼烧着齿轮，灵魂沙磨钝了每一件工具。魔族的工厂在混乱中运转，产出远不及主世界的同行。"
 HIM_undead_nature: "亡灵天性"
 HIM_undead_nature_desc: "亡灵不需要粮草，不需要被服，也不需要营房——它们只需要一个前进的方向。然而，缺乏纪律与恐惧的本能让它们在战场上难以维持阵线，组织度远逊于人类军队。"
 HIM_primal_fury: "原始暴怒"
 HIM_primal_fury_desc: "魔族依靠蛮力与本能作战，而非科学与策略。研究进程缓慢，政治结构松散，内部的混乱始终在消耗着帝国的根基。"
 HIM_overlord_collapsed: "宗主崩溃"
 HIM_overlord_collapsed_desc: "Herobrine的旗帜已经倒下，附庸势力的指挥链随之瓦解。继续抵抗只会把剩余的军队拖入毫无意义的毁灭。"
 HJM_power_balance: "帝国权力平衡"
 HJM_empire_side: "帝国"
 HJM_traveler_side: "穿越者"
 HJM_bop_balanced_range: "帝国与穿越者共治"
 HJM_empire_influence_range: "帝国主导"
 HJM_empire_dominant_range: "帝国绝对主导"
 HJM_traveler_influence_range: "穿越者影响扩大"
 HJM_traveler_dominant_range: "穿越者主导"
 HJM_record_13_war_countdown_tt: "选择该任务会立刻向HIM宣战；若不选择，倒计时结束时自动开战。"
 HJM_CAS_wing_1: "红石轰炸机联队"
 HJM_strat_bomber_wing_1: "末地战略轰炸联队"
 XWY_burning_city: "滚烫之城"
 XWY_burning_city_desc: "建立在火山上的燃烧之城。"
 ZLG_brutal_force: "野蛮力量"
 ZLG_brutal_force_desc: "任何擅闯堡垒的外来者，都将被斧刃砍成碎泥。"
 LLL_pillage: "劫掠"
 LLL_pillage_desc: "一群有组织有纪律的匪徒，魔法、巫术、利刃都只是他们的抢劫道具。"
 LLL_infiltrator: "归化族"
 LLL_infiltrator_desc: "渗透MC情报网，知己知彼。"
 GWG_dark_strength: "阴性力量"
 GWG_dark_strength_desc: "在黑夜中，我们比白天更强大！"





 #末地
 MDG_end_realm_garrisons: "末地驻防体系"
 MDG_end_realm_garrisons_desc: "末影王庭依靠稀疏的传送门、边境哨站和龙息信标维系辽阔北境。驻军规模有限，但他们熟悉荒原、冻土与无尽长夜。"
 MYR_shadow_uprising: "暗影起义"
 MYR_shadow_uprising_desc: "末影人起义军擅长突然集结、穿插袭击和切断后方道路，但这支叛军的补给体系粗糙，组织纪律也远不如正规军。"
 #魔族阵营
 HIM_faction: "魔族"
 HIM_faction_desc: "在Herobrine的领导下，魔族的重新复苏。"
 HIM.10.t: "Herobrine的邀请"
 HIM.10.d: "Herobrine的军队已经集结在下界要塞。他派出使者向所有怪物发出了邀请：我们联合！反攻主世界！让村民知道这个世界到底属于谁！"
 HIM.10.a: "加入魔族"

